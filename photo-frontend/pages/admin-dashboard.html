<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Дополнительные стили для админ-панели в неоновой теме */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--bg-card);
            padding: 32px;
            border-radius: 32px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: white;
            position: relative;
        }
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: rgba(45, 27, 46, 0.5);
            border-radius: 10px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--crimson) 0%, var(--fuchsia) 50%, var(--neon-purple) 100%);
            border-radius: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
            margin: 0 3px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
            color: white;
            display: inline-block;
        }
        .btn-small:hover {
            transform: translateY(-2px);
        }
        .btn-edit { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }
        .btn-delete { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); }
        .btn-add { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); margin-bottom: 20px; }
        .btn-assign { background: var(--main-gradient); }
        .btn-cancel { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); }
        .btn-mark-paid { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        
        /* Стили для выбора эмодзи */
        .emoji-picker {
            position: relative;
            display: inline-block;
            width: 100%;
            z-index: 1;
        }
        .emoji-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 12px 15px;
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 28px;
            background: rgba(30, 15, 40, 0.8);
            transition: all 0.3s;
            color: white;
        }
        .emoji-preview:hover {
            border-color: var(--fuchsia);
            background: rgba(255, 0, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .emoji-preview span:first-child {
            font-size: 24px;
        }
        .emoji-preview span:last-child {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        
        .emoji-dropdown-global {
            position: fixed !important;
            background: rgba(30, 15, 40, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            z-index: 10001 !important;
            max-height: 380px;
            overflow-y: auto;
            display: none;
            min-width: 320px;
            width: 320px;
        }
        .emoji-dropdown-global.show {
            display: block;
            animation: fadeInUp 0.2s ease-out;
        }
        .emoji-categories {
            display: flex;
            gap: 6px;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            background: rgba(45, 27, 46, 0.95);
            position: sticky;
            top: 0;
            flex-wrap: wrap;
            z-index: 2;
        }
        .emoji-cat-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 25px;
            font-size: 12px;
            transition: all 0.3s;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
        }
        .emoji-cat-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            transform: translateY(-2px);
            color: white;
        }
        .emoji-cat-btn.active {
            background: var(--main-gradient);
            color: white;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .emoji-list {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            padding: 12px;
            max-height: 280px;
            overflow-y: auto;
        }
        .emoji-item {
            font-size: 26px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .emoji-item:hover {
            background: rgba(255, 0, 255, 0.2);
            transform: scale(1.15);
            box-shadow: var(--shadow-glow);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Статусы */
        .status-pending { background: rgba(254, 243, 199, 0.2); color: #fde047; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-confirmed { background: rgba(219, 234, 254, 0.2); color: #93c5fd; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-progress { background: rgba(252, 231, 243, 0.2); color: #f9a8d4; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-completed { background: rgba(209, 250, 229, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-cancelled { background: rgba(254, 226, 226, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        
        .status-active { background: rgba(16,185,129,0.15); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; display: inline-block; white-space: nowrap; }
        .status-inactive { background: rgba(239,68,68,0.15); color: #fca5a5; padding: 4px 12px; border-radius: 20px; display: inline-block; white-space: nowrap; }
        
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: white; white-space: nowrap; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; background: rgba(30, 15, 40, 0.6); border-radius: 40px; cursor: pointer; transition: all 0.3s; font-weight: 600; font-size: 13px; color: white; border: 1px solid rgba(255, 0, 255, 0.2); white-space: nowrap; }
        .tab:hover { background: rgba(255, 0, 255, 0.15); transform: translateY(-2px); text-shadow: 0 0 5px #FF00FF; }
        .tab.active { background: var(--main-gradient); color: white; border-color: transparent; box-shadow: var(--shadow-glow); }
        .count-badge { background: var(--fuchsia); color: white; border-radius: 50%; padding: 2px 8px; font-size: 11px; margin-left: 8px; }
        
        /* Таблицы - все в одной строке без переносов */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .order-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        .order-table th, .order-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: white;
            white-space: nowrap;
            vertical-align: middle;
        }
        .order-table th {
            background: rgba(179, 68, 108, 0.3);
            font-weight: 700;
            color: white;
        }
        
        .services-table {
            min-width: 900px;
        }
        .services-table th, .services-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: white;
            white-space: nowrap;
            vertical-align: middle;
        }
        .services-table th {
            background: rgba(179, 68, 108, 0.3);
            font-weight: 700;
        }
        
        select.btn-small { 
            padding: 6px 12px; 
            background: rgba(30, 15, 40, 0.8); 
            border: 1px solid rgba(255, 0, 255, 0.3); 
            border-radius: 20px; 
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-summary-card { background: linear-gradient(135deg, rgba(179, 68, 108, 0.3) 0%, rgba(191, 0, 255, 0.3) 100%); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 0, 255, 0.2); backdrop-filter: blur(5px); }
        .stat-summary-card .value { font-size: 28px; font-weight: bold; color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF; }
        .stat-summary-card .label { font-size: 12px; color: rgba(255,255,255,0.8); }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-select { padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255, 0, 255, 0.3); background: rgba(30, 15, 40, 0.8); cursor: pointer; color: white; }
        .search-input { padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255, 0, 255, 0.3); background: rgba(30, 15, 40, 0.8); width: 250px; color: white; }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .total-count { margin-left: auto; font-size: 14px; color: rgba(255,255,255,0.7); white-space: nowrap; }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .option-card {
            background: rgba(30, 15, 40, 0.8);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 0, 255, 0.2);
            transition: all 0.3s;
            color: white;
        }
        .option-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--fuchsia); }
        .option-icon { font-size: 40px; margin-bottom: 10px; }
        .option-name { font-size: 16px; font-weight: bold; }
        .option-price { font-size: 18px; font-weight: bold; color: #FF66FF; margin: 8px 0; }
        .option-description { font-size: 12px; color: rgba(255,255,255,0.7); }
        .option-category { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin-top: 8px; }
        .category-effect { background: rgba(224, 231, 255, 0.2); color: #a78bfa; }
        .category-frame { background: rgba(252, 231, 243, 0.2); color: #f9a8d4; }
        .category-filter { background: rgba(209, 250, 229, 0.2); color: #6ee7b7; }
        
        .card h2 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .navbar-logo {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        .navbar-links a {
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .navbar-links a:hover {
            text-shadow: 0 0 5px #FF00FF;
        }
        .user-name {
            color: white;
            text-shadow: 0 0 3px #FF00FF;
        }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .emoji-list { grid-template-columns: repeat(6, 1fr); }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar .total-count { margin-left: 0; text-align: center; }
            .search-input { width: 100%; }
            .order-table th, .order-table td { padding: 8px 10px; font-size: 12px; }
        }
    </style>
</head>

    <script>

        let currentToken = null;

        let currentOrderTab = 'all';
        let allOrders = [];
        let pendingOrders = [];

        let userRoleFilter = 'all';

        let userSearchQuery = '';
        
        let extraOptions = [];
        let certificates = [];
        
        const emojiCategories = {
            '😀 Смайлы': ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','☠️','👽','👾','🤖','🎃'],
            '❤️ Сердца': ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟'],
            '🎁 Предметы': ['🎁','🎀','🎂','🎈','🎉','🎊','🎋','🎍','🎎','🎏','🎐','🎑','🎒','🎓','🎖️','🎗️','🎙️','🎚️','🎛️','🎞️','🎟️','🎠','🎡','🎢','🎣','🎤','🎥','🎦','🎧','🎨','🎩','🎪','🎫','🎬','🎭','🎮','🎯','🎰','🎱','🎲','🎳','🎴','🎵','🎶','🎷','🎸','🎹','🎺','🎻','🎼','🎽','🎾','🎿','🏀','🏁','🏂','🏃','🏄','🏆','🏇','🏈','🏉','🏊','🏋️','🏌️','🏍️','🏎️','🏏','🏐','🏑','🏒','🏓','🏔️','🏕️','🏖️','🏗️','🏘️','🏙️','🏚️','🏛️','🏜️','🏝️','🏞️','🏟️','🏠','🏡','🏢','🏣','🏤','🏥','🏦','🏧','🏨','🏩','🏪','🏫','🏬','🏭','🏮','🏯','🏰'],
            '📸 Фото/Камера': ['📸','🎥','📹','📷','🎬','🎞️','🕹️','📽️','🔭','🔬','📡','🎥','🎦','📺','📻','🎙️','🎚️','🎛️','📀','💿','📼','🔊','🔉','🔈','🔇','📢','📣','🔔','🔕','🎵','🎶','🎤','🎧','📞','📟','📠','📨','📩','📪','📫','📮','🕯️','💡','🔦','🏮','📯','🪔','🧨','🎇','🎆','✨','⭐','🌟','🌠','🌈','☀️','☁️','⛅','🌤️','🌥️','🌦️','🌧️','🌨️','🌩️','🌪️','🌫️','🌬️','🌀','🌂','☂️','☔','⛱️','⚡','❄️','☃️','⛄','☄️','🔥','💧','🌊','💨','🌫️','🌡️','🧊','🍃','🍂','🍁','🍄','🌰','🌱','🌿','☘️','🍀','🎋','🎍','🌴','🌵','🌲','🌳','🌾','🌽','🍅','🍆','🍇','🍈','🍉','🍊','🍋','🍌','🍍','🥭','🍎','🍏','🍐','🍑','🍒','🍓','🥝','🍅','🥥','🥑','🍆','🥔','🥕','🌽','🌶️','🥒','🥬','🥦','🧄','🧅','🍄','🥜','🌰','🍞','🥐','🥖','🥨','🥯','🥞','🧇','🧀','🍖','🍗','🥩','🥓','🍔','🍟','🍕','🌭','🥪','🌮','🌯','🫔','🥙','🧆','🥚','🍳','🥘','🍲','🫕','🥣','🥗','🍿','🧈','🧂','🥫','🍱','🍘','🍙','🍚','🍛','🍜','🍝','🍠','🍢','🍣','🍤','🍥','🥮','🍡','🥟','🥠','🥡','🦀','🦞','🦐','🦑','🐙','🍦','🍧','🍨','🍩','🍪','🎂','🍰','🧁','🥧','🍫','🍬','🍭','🍮','🍯','🥛','🍼','🥤','🧃','🧉','🧊','🍶','🍷','🍸','🍹','🍺','🍻','🥂','🥃','🫖','🥄','🔪','🍴','🍽️','🥢','⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🥏','🎱','🪀','🏓','🏸','🏒','🏑','🥍','🏏','🥅','⛳','🏹','🎣','🥊','🥋','🎽','🛹','🛷','⛸️','🥌','🎿','⛷️','🏂','🪂','🏋️','🤼','🤸','🤹','🧘','🏄','🏊','🤽','🚣','🏇','🚴','🚵','🎯','🎳','🎮','🎰','🧩','♟️','🎲','♠️','♥️','♦️','♣️','🃏','🀄️','🎴','🔮','🎭','🎨','🪄']
        };
        
        let currentActivePicker = null;
        
        function createEmojiPicker(inputId, previewId) {
            return `
                <div class="emoji-picker" id="emoji-picker-${previewId}" data-input-id="${inputId}" data-preview-id="${previewId}">
                    <div class="emoji-preview" onclick="openEmojiDropdownGlobal('${previewId}', '${inputId}')">
                        <span id="${previewId}_icon">🎁</span>
                        <span>▼ Выбрать эмодзи</span>
                    </div>
                    <input type="hidden" id="${inputId}" value="🎁">
                </div>
            `;
        }
        
        function openEmojiDropdownGlobal(previewId, inputId) {
            if (currentActivePicker) closeGlobalEmojiDropdown();
            const picker = document.getElementById(`emoji-picker-${previewId}`);
            if (!picker) return;
            const preview = picker.querySelector('.emoji-preview');
            const previewRect = preview.getBoundingClientRect();
            const dropdown = document.createElement('div');
            dropdown.id = `emoji-dropdown-global-${previewId}`;
            dropdown.className = 'emoji-dropdown-global';
            dropdown.innerHTML = `<div class="emoji-categories" id="emoji-categories-global-${previewId}"></div><div class="emoji-list" id="emoji-list-global-${previewId}"></div>`;
            document.body.appendChild(dropdown);
            const spaceBelow = window.innerHeight - previewRect.bottom;
            const dropdownHeight = 380;
            const spaceAbove = previewRect.top;
            if (spaceBelow >= dropdownHeight || spaceBelow > spaceAbove) {
                dropdown.style.top = `${previewRect.bottom + 5}px`;
                dropdown.style.bottom = 'auto';
            } else {
                dropdown.style.bottom = `${window.innerHeight - previewRect.top + 5}px`;
                dropdown.style.top = 'auto';
            }
            const spaceRight = window.innerWidth - previewRect.right;
            if (spaceRight < 320) {
                dropdown.style.right = '10px';
                dropdown.style.left = 'auto';
            } else {
                dropdown.style.left = `${previewRect.left}px`;
                dropdown.style.right = 'auto';
            }
            dropdown.classList.add('show');
            currentActivePicker = { dropdownId: dropdown.id, previewId: previewId, inputId: inputId };
            initGlobalEmojiPicker(previewId, inputId);
            setTimeout(() => {
                const closeHandler = function(e) {
                    if (!dropdown.contains(e.target) && !preview.contains(e.target)) {
                        closeGlobalEmojiDropdown();
                        document.removeEventListener('click', closeHandler);
                    }
                };
                document.addEventListener('click', closeHandler);
            }, 10);
        }
        
        function closeGlobalEmojiDropdown() {
            if (currentActivePicker) {
                const dropdown = document.getElementById(currentActivePicker.dropdownId);
                if (dropdown) dropdown.remove();
                currentActivePicker = null;
            }
        }
        
        function initGlobalEmojiPicker(previewId, inputId) {
            const categoriesContainer = document.getElementById(`emoji-categories-global-${previewId}`);
            const listContainer = document.getElementById(`emoji-list-global-${previewId}`);
            if (!categoriesContainer || !listContainer) return;
            const categoryNames = Object.keys(emojiCategories);
            categoriesContainer.innerHTML = categoryNames.map((cat, idx) => `<button class="emoji-cat-btn ${idx === 0 ? 'active' : ''}" onclick="switchGlobalEmojiCategory('${previewId}', '${cat.replace(/'/g, "\\'")}', '${inputId}')">${cat}</button>`).join('');

        function switchGlobalEmojiCategory(previewId, category, inputId) {
            const buttons = document.querySelectorAll(`#emoji-categories-global-${previewId} .emoji-cat-btn`);
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === category) btn.classList.add('active');
            });
            renderGlobalEmojiList(previewId, category, null, null, inputId);
        }

            const previewSpan = document.getElementById(`${previewId}_icon`);

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) { window.location.href = 'login.html'; return false; }
            currentToken = token;
            currentUser = JSON.parse(user);
            if (currentUser.role !== 'Admin') {
                alert('Доступ только для администратора!');
                window.location.href = 'client-dashboard.html';
                return false;
            }
            return true;

        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {

            });
            if (response.status === 401) logout();
            return response;
        }

            alertDiv.style.zIndex = '9999';

            modal.innerHTML = `
                <div class="modal-content"><h3>✏ Редактировать сертификат</h3>
                <form id="editCertificateForm"><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="certName" value="${cert.name}" required></div>
                <div class="form-group"><label>Иконка</label>${createEmojiPicker('certIcon', 'certIcon_preview')}</div></div>
                <div class="form-group"><label>Цена (₽)</label><input type="number" id="certPrice" value="${cert.price}" required></div>
                <div class="form-group"><label>Описание</label><textarea id="certDescription" rows="4" required>${cert.description}</textarea></div>
                <div class="btn-group"><button type="submit" class="btn btn-primary">Сохранить</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">Отмена</button></div></form></div>`;
            document.body.appendChild(modal);
            closeEmojiDropdownOnScroll();
            document.getElementById('editCertificateForm').addEventListener('submit', (e) => {
                e.preventDefault();
                cert.name = document.getElementById('certName').value;
                cert.icon = document.getElementById('certIcon').value;
                cert.price = parseInt(document.getElementById('certPrice').value);
                cert.description = document.getElementById('certDescription').value;
                saveCertificatesToStorage();
                showAlert('✅ Сертификат обновлен!');
                modal.remove();
                loadCertificates();
            });
        };
        
        window.deleteCertificate = function(certId) {
            if (confirm('Удалить сертификат?')) {
                certificates = certificates.filter(c => c.id !== certId);
                saveCertificatesToStorage();
                showAlert('✅ Сертификат удален!');
                loadCertificates();
            }
        };
        
        // ============ УПРАВЛЕНИЕ ФОТОГРАФАМИ ============
        
        async function loadPhotographers() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/admin/users');
                const users = await response.json();
                const photographersList = users.filter(u => u.role === 'Photographer');
                content.innerHTML = `
                    <div class="card">
                        <h2>📷 Управление фотографами</h2>
                        <button class="btn btn-add" onclick="showAddPhotographerModal()">+ Добавить фотографа</button>
                        <div class="table-responsive">
                            <table class="order-table">
                                <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Статус</th><th>Действия</th></tr></thead>
                                <tbody>${photographersList.map(photog => `
                                    <tr>
                                        <td>${photog.id}</td>
                                        <td>${photog.firstName} ${photog.lastName}</td>
                                        <td>${photog.email}</td>
                                        <td>${photog.phone || '—'}</td>
                                        <td><span class="${photog.isActive ? 'status-active' : 'status-inactive'}">${photog.isActive ? '🟢 Активен' : '🔴 Неактивен'}</span></td>
                                        <td><button class="btn-small btn-delete" onclick="deletePhotographer(${photog.id})">🗑 Удалить</button></td>
                                    </tr>
                                `).join('')}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">Ошибка: ${error.message}</div>`; }
        }
        
        function showAddPhotographerModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content"><h3>➕ Добавить фотографа</h3>
                <form id="addPhotographerForm"><div class="form-row"><div class="form-group"><label>Имя</label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Фамилия</label><input type="text" id="lastName" required></div></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Телефон</label><input type="text" id="phone"></div>
                <div class="btn-group"><button type="submit" class="btn btn-primary">Сохранить</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">Отмена</button></div></form></div>`;
            document.body.appendChild(modal);
            document.getElementById('addPhotographerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const photographer = { email: document.getElementById('email').value, password: document.getElementById('password').value, firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value, phone: document.getElementById('phone').value, role: 'Photographer' };
                const response = await apiRequest('/admin/users', { method: 'POST', body: JSON.stringify(photographer) });
                if (response.ok) { showAlert('✅ Фотограф добавлен!'); modal.remove(); loadPhotographers(); }
                else { showAlert('❌ Ошибка добавления', 'error'); }
            });
        }
        
        window.deletePhotographer = async function(id) {
            if (confirm('Удалить фотографа?')) {
                const response = await apiRequest(`/admin/users/${id}`, { method: 'DELETE' });
                if (response.ok) { showAlert('✅ Фотограф удален!'); loadPhotographers(); }
                else { showAlert('❌ Ошибка удаления', 'error'); }
            }
        };
        
        // ============ УПРАВЛЕНИЕ ЗАКАЗАМИ ============
        
        async function loadOrders() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const usersResponse = await apiRequest('/admin/users');
                const allUsers = await usersResponse.json();
                photographers = allUsers.filter(u => u.role === 'Photographer' && u.isActive);
                const ordersResponse = await apiRequest('/admin/orders');
                allOrders = ordersResponse.ok ? await ordersResponse.json() : [];
                const pendingResponse = await apiRequest('/admin/orders/pending');
                pendingOrders = pendingResponse.ok ? await pendingResponse.json() : [];
                const totalRevenue = allOrders.reduce((sum, o) => sum + (o.paymentStatus === 2 ? o.totalAmount : 0), 0);
                const paidOrders = allOrders.filter(o => o.paymentStatus === 2).length;
                const unpaidOrders = allOrders.filter(o => o.paymentStatus === 0).length;
                const partiallyPaidOrders = allOrders.filter(o => o.paymentStatus === 1).length;
                content.innerHTML = `
                    <div class="card">
                        <h2>📋 Управление заказами</h2>
                        <div class="stats-summary">
                            <div class="stat-summary-card"><div class="value">${allOrders.length}</div><div class="label">Всего заказов</div></div>
                            <div class="stat-summary-card"><div class="value">${totalRevenue} ₽</div><div class="label">Оплачено</div></div>
                            <div class="stat-summary-card"><div class="value">${paidOrders}</div><div class="label">Оплаченных</div></div>
                            <div class="stat-summary-card"><div class="value">${unpaidOrders}</div><div class="label">Неоплаченных</div></div>
                            <div class="stat-summary-card"><div class="value">${partiallyPaidOrders}</div><div class="label">Частично оплаченных</div></div>
                        </div>
                        <div class="tabs">
                            <div class="tab ${currentOrderTab === 'all' ? 'active' : ''}" onclick="switchOrderTab('all')">📋 Все заказы (${allOrders.length})</div>
                            <div class="tab ${currentOrderTab === 'pending' ? 'active' : ''}" onclick="switchOrderTab('pending')">⏳ Ожидают назначения ${pendingOrders.length > 0 ? `<span class="count-badge">${pendingOrders.length}</span>` : ''}</div>
                        </div>
                        <div id="ordersContainer"></div>
                    </div>
                `;
                renderOrdersTab();
            } catch (error) { content.innerHTML = `<div class="alert alert-error">Ошибка: ${error.message}</div>`; }
        }
        
        window.switchOrderTab = function(tab) { currentOrderTab = tab; renderOrdersTab(); };
        
        function renderOrdersTab() {
            const container = document.getElementById('ordersContainer');
            const orders = currentOrderTab === 'all' ? allOrders : pendingOrders;
            if (!orders || orders.length === 0) { container.innerHTML = '<p style="text-align:center;padding:20px;">Нет заказов</p>'; return; }
            let html = `<div class="table-responsive"><table class="order-table"><thead><tr><th>ID</th><th>Клиент</th><th>Дата</th><th>Сумма</th><th>Способ оплаты</th><th>Статус оплаты</th><th>Фотограф</th><th>Статус заказа</th><th>Действия</th></tr></thead><tbody>`;
            orders.forEach(order => {
                const canAssign = order.status === 0 && !order.photographerId;
                const canCancel = order.status !== 3 && order.status !== 4;
                const canMarkPaid = order.paymentStatus !== 2 && order.status !== 4;
                html += `<tr>
                    <td>${order.id}</td>
                    <td>${order.client?.firstName || '?'} ${order.client?.lastName || ''}</td>
                    <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                    <td>${order.totalAmount} ₽</td>
                    <td>${getPaymentMethodText(order.paymentMethod)}</td>
                    <td><span class="${getPaymentStatusClass(order.paymentStatus)}">${getPaymentStatusText(order.paymentStatus)}</span></td>
                    <td>${order.photographer?.firstName || order.photographerId || '—'}</td>
                    <td><span class="${getStatusClass(order.status)}">${getStatusName(order.status)}</span></td>
                    <td>
                        ${canAssign ? `<select id="assign_${order.id}" class="btn-small"><option value="">Выбрать</option>${photographers.map(p => `<option value="${p.id}">${p.firstName} ${p.lastName}</option>`).join('')}</select><button class="btn-small btn-assign" onclick="assignOrder(${order.id})">📌 Назначить</button>` : ''}
                        ${canMarkPaid ? `<button class="btn-small btn-mark-paid" onclick="markOrderAsPaid(${order.id})">💰 Оплачен</button>` : ''}
                        ${canCancel ? `<button class="btn-small btn-cancel" onclick="cancelOrderByAdmin(${order.id})">❌ Отменить</button>` : ''}
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }
        
        window.assignOrder = async function(orderId) {
            const select = document.getElementById(`assign_${orderId}`);
            const photographerId = select.value;
            if (!photographerId) { showAlert('Выберите фотографа', 'error'); return; }
            const response = await apiRequest(`/admin/orders/${orderId}/assign/${photographerId}`, { method: 'POST' });
            if (response.ok) { showAlert('✅ Заказ назначен'); loadOrders(); }
            else { showAlert('❌ Ошибка назначения', 'error'); }
        };
        
        window.cancelOrderByAdmin = async function(orderId) {
            if (!confirm('Отменить этот заказ?')) return;
            const response = await apiRequest(`/admin/orders/${orderId}/cancel`, { method: 'PUT' });
            if (response.ok) { showAlert('✅ Заказ отменен'); loadOrders(); }
            else { showAlert('❌ Ошибка отмены', 'error'); }
        };
        
        window.markOrderAsPaid = async function(orderId) {
            if (!confirm('Отметить заказ как оплаченный?')) return;
            const response = await apiRequest(`/admin/orders/${orderId}/mark-paid`, { method: 'PUT' });
            if (response.ok) { showAlert('✅ Заказ отмечен как оплаченный'); loadOrders(); }
            else { showAlert('❌ Ошибка', 'error'); }
        };
        
        // ============ ПРОСМОТР ПОЛЬЗОВАТЕЛЕЙ ============
        
        function filterUsers(users) {
            return users.filter(user => {
                if (userRoleFilter !== 'all' && user.role !== userRoleFilter) return false;
                if (userStatusFilter !== 'all') { const isActive = userStatusFilter === 'active'; if (user.isActive !== isActive) return false; }
                if (userSearchQuery) { const query = userSearchQuery.toLowerCase(); const fullName = `${user.firstName} ${user.lastName}`.toLowerCase(); const email = user.email.toLowerCase(); if (!fullName.includes(query) && !email.includes(query)) return false; }
                return true;
            });
        }
        
        async function loadUsers() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/admin/users');
                let allUsers = await response.json();
                const filteredUsers = filterUsers(allUsers);
                const totalClients = allUsers.filter(u => u.role === 'Client').length;
                const totalPhotographers = allUsers.filter(u => u.role === 'Photographer').length;
                const totalAdmins = allUsers.filter(u => u.role === 'Admin').length;
                const totalAccountants = allUsers.filter(u => u.role === 'Accountant').length;
                const activeUsers = allUsers.filter(u => u.isActive).length;
                const inactiveUsers = allUsers.filter(u => !u.isActive).length;
                content.innerHTML = `
                    <div class="card">
                        <h2>👥 Управление пользователями</h2>
                        <div class="stats-summary">
                            <div class="stat-summary-card"><div class="value">${allUsers.length}</div><div class="label">Всего пользователей</div></div>
                            <div class="stat-summary-card"><div class="value">${totalClients}</div><div class="label">👤 Клиенты</div></div>
                            <div class="stat-summary-card"><div class="value">${totalPhotographers}</div><div class="label">📸 Фотографы</div></div>
                            <div class="stat-summary-card"><div class="value">${totalAdmins}</div><div class="label">👑 Администраторы</div></div>
                            <div class="stat-summary-card"><div class="value">${totalAccountants}</div><div class="label">💰 Бухгалтеры</div></div>
                            <div class="stat-summary-card"><div class="value">${activeUsers}</div><div class="label">🟢 Активные</div></div>
                            <div class="stat-summary-card"><div class="value">${inactiveUsers}</div><div class="label">🔴 Неактивные</div></div>
                        </div>
                        <div class="filter-bar">
                            <select id="roleFilter" class="filter-select" onchange="applyFilters()"><option value="all">Все роли</option><option value="Client">👤 Клиенты</option><option value="Photographer">📸 Фотографы</option><option value="Admin">👑 Администраторы</option><option value="Accountant">💰 Бухгалтеры</option></select>
                            <select id="statusFilter" class="filter-select" onchange="applyFilters()"><option value="all">Все статусы</option><option value="active">🟢 Активные</option><option value="inactive">🔴 Неактивные</option></select>
                            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск..." onkeyup="applyFilters()">
                            <button class="btn-add" onclick="showAddUserModal()" style="margin:0; padding:8px 20px;">+ Добавить пользователя</button>
                            <div class="total-count">Найдено: ${filteredUsers.length}</div>
                        </div>
                        <div class="table-responsive">
                            <table class="order-table">
                                <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Роль</th><th>Дата регистрации</th><th>Статус</th><th>Действия</th></tr></thead>
                                <tbody>${filteredUsers.map(user => `<tr>
                                    <td>${user.id}</td>
                                    <td>${user.firstName} ${user.lastName}</td>
                                    <td>${user.email}</td>
                                    <td>${user.phone || '—'}</td>
                                    <td><span class="role-badge" style="background:${getRoleColor(user.role)}">${getRoleIcon(user.role)} ${getRoleName(user.role)}</span></td>
                                    <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '—'}</td>
                                    <td><span class="${user.isActive ? 'status-active' : 'status-inactive'}">${user.isActive ? '🟢 Активен' : '🔴 Неактивен'}</span></td>
                                    <td>
                                        <button class="btn-small ${user.isActive ? 'btn-delete' : 'btn-add'}" onclick="toggleUserStatus(${user.id}, ${!user.isActive})">${user.isActive ? '🔒 Заблокировать' : '✅ Активировать'}</button>
                                        <button class="btn-small btn-delete" onclick="deleteUser(${user.id})">🗑 Удалить</button>
                                    </td>
                                `).join('')}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">Ошибка: ${error.message}</div>`; }
        }
        
        window.applyFilters = function() {
            userRoleFilter = document.getElementById('roleFilter').value;
            userStatusFilter = document.getElementById('statusFilter').value;
            userSearchQuery = document.getElementById('searchInput').value;
            loadUsers();
        };
        
        window.showAddUserModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content"><h3>➕ Добавить пользователя</h3>
                <form id="addUserForm"><div class="form-row"><div class="form-group"><label>Имя *</label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Фамилия *</label><input type="text" id="lastName" required></div></div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Пароль *</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Телефон</label><input type="text" id="phone"></div>
                <div class="form-group"><label>Роль *</label><select id="role" required><option value="Client">👤 Клиент</option><option value="Photographer">📸 Фотограф</option><option value="Accountant">💰 Бухгалтер</option><option value="Admin">👑 Администратор</option></select></div>
                <div class="btn-group"><button type="submit" class="btn btn-primary">Сохранить</button><button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">Отмена</button></div></form></div>`;
            document.body.appendChild(modal);
            document.getElementById('addUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const user = { email: document.getElementById('email').value, password: document.getElementById('password').value, firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value, phone: document.getElementById('phone').value, role: document.getElementById('role').value };
                const response = await apiRequest('/admin/users', { method: 'POST', body: JSON.stringify(user) });
                if (response.ok) { showAlert('✅ Пользователь добавлен!'); modal.remove(); loadUsers(); }
                else { showAlert('❌ Ошибка добавления', 'error'); }
            });
        };
        
        window.deleteUser = async function(userId) {
            if (confirm('Удалить пользователя?')) {
                const response = await apiRequest(`/admin/users/${userId}`, { method: 'DELETE' });
                if (response.ok) { showAlert('✅ Пользователь удален!'); loadUsers(); }
                else { showAlert('❌ Ошибка удаления', 'error'); }
            }
        };
        
        window.toggleUserStatus = async function(userId, activate) {
            const response = await apiRequest(`/admin/users/${userId}/activate`, { method: 'PUT' });
            if (response.ok) { showAlert(`✅ Пользователь ${activate ? 'активирован' : 'заблокирован'}!`); loadUsers(); }
            else { showAlert('❌ Ошибка изменения статуса', 'error'); }
        };
        
        loadExtraOptionsFromStorage();
        
        window.loadServices = loadServices;
        window.loadExtraOptions = loadExtraOptions;
        window.loadCertificates = loadCertificates;
        window.loadPhotographers = loadPhotographers;
        window.loadOrders = loadOrders;
        window.loadUsers = loadUsers;
        window.openEmojiDropdownGlobal = openEmojiDropdownGlobal;
        window.switchGlobalEmojiCategory = switchGlobalEmojiCategory;
        window.selectGlobalEmoji = selectGlobalEmoji;
        window.closeGlobalEmojiDropdown = closeGlobalEmojiDropdown;
        
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadServices();
        }
    </script>
</body>
</html>
