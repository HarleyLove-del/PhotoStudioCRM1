<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотограф - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Стили для страницы фотографа в неоновой теме */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .order-card {
            background: rgba(30, 15, 40, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
            border-left: 4px solid var(--fuchsia);
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
            color: white;
        }
        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .order-card.pending { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .order-card.confirmed { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .order-card.progress { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .order-card.completed { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); opacity: 0.9; }
        
        .order-title { 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: white;
            text-shadow: 0 0 3px #FF00FF, 0 0 5px #BF00FF;
        }
        .order-info { 
            font-size: 14px; 
            color: white; 
            margin: 8px 0;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .services-list { 
            margin: 10px 0; 
            padding: 10px; 
            background: rgba(30, 15, 40, 0.6); 
            border-radius: 12px; 
            border: 1px solid rgba(255, 0, 255, 0.15); 
        }
        .service-item { 
            font-size: 12px; 
            padding: 4px 0; 
            display: flex; 
            justify-content: space-between; 
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .service-total { 
            border-top: 1px solid rgba(255, 0, 255, 0.2); 
            margin-top: 8px; 
            padding-top: 8px; 
            font-weight: bold; 
            color: white;
            text-shadow: 0 0 3px #FF00FF;
        }
        
        .options-list { 
            margin: 10px 0; 
            padding: 10px; 
            background: rgba(255, 0, 255, 0.1); 
            border-radius: 12px; 
            border: 1px solid rgba(255, 0, 255, 0.2); 
        }
        .option-item { 
            font-size: 12px; 
            padding: 4px 0; 
            display: flex; 
            justify-content: space-between; 
            color: #FF66FF;
            text-shadow: 0 0 3px #FF00FF;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .status-confirmed { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .status-progress { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .btn-accept {
            background: var(--main-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
            transition: all 0.3s;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .btn-accept:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        
        .btn-status {
            background: rgba(30, 15, 40, 0.8);
            color: white;
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: all 0.3s;
        }
        .btn-status:hover { background: rgba(255, 0, 255, 0.15); border-color: var(--fuchsia); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { 
            padding: 8px 20px; 
            background: rgba(30, 15, 40, 0.6); 
            border-radius: 40px; 
            cursor: pointer; 
            transition: all 0.3s; 
            color: white;
            border: 1px solid rgba(255, 0, 255, 0.2);
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .tab:hover { background: rgba(255, 0, 255, 0.15); transform: translateY(-2px); text-shadow: 0 0 5px #FF00FF; }
        .tab.active { 
            background: var(--main-gradient); 
            color: white; 
            box-shadow: var(--shadow-glow); 
            border-color: transparent;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .count-badge { background: var(--fuchsia); color: white; border-radius: 50%; padding: 2px 8px; font-size: 11px; margin-left: 8px; }
        
        .detail-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255, 0, 255, 0.2);
        }
        .detail-title {
            font-size: 12px;
            font-weight: 600;
            color: #FF66FF;
            margin-bottom: 8px;
            text-shadow: 0 0 3px #FF00FF;
        }
        .effect-tag {
            display: inline-block;
            background: rgba(255, 0, 255, 0.15);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin: 2px;
            color: #FF66FF;
        }
        
        .photographer-assigned {
            background: rgba(59, 130, 246, 0.15);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #3b82f6;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .stat-card h3 {
            font-size: 14px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 3px #FF00FF;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: white;
        }
        .modal-content h3 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .card h2 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .alert-success, .alert-error, .alert-info {
            color: white;
        }
        
        @media (max-width: 768px) {
            .orders-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../js/animations-light.js"></script>
    <script>
        const API_URL = 'https://localhost:7042/api';
        let currentToken = null;
        let currentUser = null;
        let currentTab = 'pending';
        let dashboardData = null;
        
        function getPaymentStatusText(status) {
            const statuses = { 0: '⏳ Не оплачен', 1: '🔄 Частично оплачен', 2: '✅ Оплачен', 3: '↩️ Возврат' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getPaymentStatusClass(status) {
            const classes = { 0: 'payment-status-notpaid', 1: 'payment-status-partial', 2: 'payment-status-paid', 3: 'payment-status-notpaid' };
            return classes[status] || 'payment-status-notpaid';
        }
        
        function getPaymentMethodText(method) {
            const methods = { 'card': '💳 Карта', 'cash': '💰 Наличные', 'online': '🏦 Онлайн перевод', 'installment': '📅 Рассрочка' };
            return methods[method] || method || 'Не указан';
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return false;
            }
            currentToken = token;
            currentUser = JSON.parse(user);
            if (currentUser.role !== 'Photographer') {
                alert('Доступ только для фотографов!');
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}`, ...options.headers }
            });
            if (response.status === 401) logout();
            return response;
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.padding = '15px';
            alertDiv.style.borderRadius = '10px';
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function renderNavbar() {
            return `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-logo" style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📸 PhotoStudio CRM - Фотограф</div>
                        <div class="navbar-links">
                            <a onclick="loadDashboard()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">🏠 Дашборд</a>
                            <a onclick="loadMyOrders()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📷 Мои заказы</a>
                            <a onclick="loadMySchedule()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📅 Расписание</a>
                        </div>
                        <div class="user-info">
                            <span class="user-name" style="color: white; text-shadow: 0 0 3px #FF00FF;">📸 ${currentUser.firstName} ${currentUser.lastName}</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                </div>
                <div class="container" id="pageContent"><div class="spinner"></div></div>
            `;
        }
        
        function getStatusName(status) {
            const statuses = { 0: 'Ожидает', 1: 'Подтвержден', 2: 'В работе', 3: 'Выполнен', 4: 'Отменен' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getStatusClass(status) {
            if (status === 0) return 'status-pending';
            if (status === 1) return 'status-confirmed';
            if (status === 2) return 'status-progress';
            if (status === 3) return 'status-completed';
            return 'status-pending';
        }
        
        function getOrderCardClass(order) {
            if (order.status === 0) return 'pending';
            if (order.status === 1) return 'confirmed';
            if (order.status === 2) return 'progress';
            if (order.status === 3) return 'completed';
            return '';
        }
        
        function extractEffectsFromNotes(notes) {
            if (!notes) return [];
            const effectsMatch = notes.match(/Эффекты:\s*([^|]+)/);
            if (effectsMatch) {
                return effectsMatch[1].split(',').map(e => e.trim()).filter(e => e && e !== 'нет');
            }
            return [];
        }
        
        function extractServicesFromNotes(notes) {
            if (!notes) return [];
            const servicesMatch = notes.match(/Услуги:\s*([^|]+)/);
            if (servicesMatch) {
                return servicesMatch[1].split(',').map(s => s.trim());
            }
            return [];
        }
        
        function extractDateFromNotes(notes) {
            if (!notes) return null;
            const dateMatch = notes.match(/Дата:\s*([^|]+)/);
            return dateMatch ? dateMatch[1] : null;
        }
        
        function extractPhotographerFromNotes(notes) {
            if (!notes) return null;
            const photographerMatch = notes.match(/Фотограф:\s*([^|]+)/);
            return photographerMatch ? photographerMatch[1] : null;
        }
        
        function renderOrderCard(order, showAcceptButton = false) {
            const totalAmount = order.totalAmount || order.orderServices?.reduce((sum, os) => sum + (os.priceAtTime || 0), 0) || 0;
            
            let servicesHtml = '';
            if (order.orderServices && order.orderServices.length > 0) {
                servicesHtml = order.orderServices.map(os => `
                    <div class="service-item">
                        <span>📷 ${os.service?.name || 'Услуга'}</span>
                        <span>${os.priceAtTime || 0} ₽</span>
                    </div>
                `).join('');
            } else {
                const servicesFromNotes = extractServicesFromNotes(order.notes);
                servicesHtml = servicesFromNotes.map(service => `
                    <div class="service-item">
                        <span>📷 ${service}</span>
                        <span>—</span>
                    </div>
                `).join('');
            }
            
            const effects = extractEffectsFromNotes(order.notes);
            const effectsHtml = effects.length > 0 ? `
                <div class="options-list">
                    <div class="detail-title">✨ Выбранные эффекты:</div>
                    ${effects.map(e => `<div class="option-item"><span>✨ ${e}</span><span>✓</span></div>`).join('')}
                </div>
            ` : '';
            
            const photographerName = extractPhotographerFromNotes(order.notes);
            const sessionDate = extractDateFromNotes(order.notes);
            
            return `
                <div class="order-card ${getOrderCardClass(order)}">
                    <div class="order-title">Заказ #${order.id}</div>
                    <div class="order-info">👤 Клиент: ${order.client?.firstName || 'Не указан'} ${order.client?.lastName || ''}</div>
                    <div class="order-info">📅 Создан: ${new Date(order.orderDate).toLocaleString()}</div>
                    ${photographerName ? `<div class="order-info photographer-assigned">📸 Назначен фотограф: ${photographerName}</div>` : ''}
                    ${sessionDate ? `<div class="order-info">📅 Дата съемки: ${sessionDate}</div>` : ''}
                    
                    <div class="services-list">
                        <div class="detail-title">📸 Услуги:</div>
                        ${servicesHtml}
                        <div class="service-item service-total">
                            <span>💰 Итого:</span>
                            <span>${totalAmount} ₽</span>
                        </div>
                    </div>
                    
                    ${effectsHtml}
                    
                    <div class="order-info">💳 Оплата: ${getPaymentMethodText(order.paymentMethod)} | <span class="${getPaymentStatusClass(order.paymentStatus)}">${getPaymentStatusText(order.paymentStatus)}</span></div>
                    <div class="order-info">📝 Статус: <span class="status-badge ${getStatusClass(order.status)}">${getStatusName(order.status)}</span></div>
                    
                    ${order.notes && !effects.length && !extractServicesFromNotes(order.notes).length ? `<div class="order-info">📝 Примечания: ${order.notes.substring(0, 100)}${order.notes.length > 100 ? '...' : ''}</div>` : ''}
                    
                    ${showAcceptButton ? `
                        <button class="btn-accept" onclick="acceptOrder(${order.id})">✅ Принять заказ</button>
                    ` : `
                        <div style="margin-top: 10px;">
                            <select id="status_${order.id}" class="btn-status" style="padding: 6px; background: rgba(30, 15, 40, 0.8); color: white; border: 1px solid rgba(255, 0, 255, 0.3);">
                                <option value="1" ${order.status === 1 ? 'selected' : ''}>Подтвержден</option>
                                <option value="2" ${order.status === 2 ? 'selected' : ''}>В работе</option>
                                <option value="3" ${order.status === 3 ? 'selected' : ''}>Выполнен</option>
                                <option value="4" ${order.status === 4 ? 'selected' : ''}>Отменен</option>
                            </select>
                            <button class="btn-status" onclick="updateOrderStatus(${order.id})">Обновить</button>
                        </div>
                    `}
                </div>
            `;
        }
        
        async function loadDashboard() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/photographer/dashboard');
                dashboardData = await response.json();
                const pendingCount = dashboardData.pendingOrders?.length || 0;
                const myOrdersCount = dashboardData.myOrders?.length || 0;
                content.innerHTML = `
                    <div style="margin-bottom:30px;">
                        <h1 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">Добро пожаловать, ${currentUser.firstName}!</h1>
                        <p style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">Ваша панель управления заказами</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Новые заказы</h3><div class="value">${pendingCount}</div></div>
                        <div class="stat-card"><h3>Мои заказы</h3><div class="value">${myOrdersCount}</div></div>
                        <div class="stat-card"><h3>Выполнено</h3><div class="value">${dashboardData.stats?.completedOrders || 0}</div></div>
                        <div class="stat-card"><h3>В работе</h3><div class="value">${dashboardData.stats?.inProgressOrders || 0}</div></div>
                    </div>
                    <div class="tabs">
                        <div class="tab ${currentTab === 'pending' ? 'active' : ''}" onclick="switchTab('pending')">📋 Новые заказы ${pendingCount > 0 ? `<span class="count-badge">${pendingCount}</span>` : ''}</div>
                        <div class="tab ${currentTab === 'my' ? 'active' : ''}" onclick="switchTab('my')">📷 Мои заказы</div>
                    </div>
                    <div id="ordersContainer"></div>`;
                renderCurrentTab();
            } catch (error) { content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        }
        
        function renderCurrentTab() {
            const container = document.getElementById('ordersContainer');
            if (currentTab === 'pending') {
                const pendingOrders = dashboardData?.pendingOrders || [];
                if (pendingOrders.length === 0) container.innerHTML = '<div class="card"><p style="text-align: center; color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">✨ Нет новых заказов. Отдыхайте!</p></div>';
                else container.innerHTML = `<h2 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📋 Новые заказы (требуют подтверждения)</h2><div class="orders-grid">${pendingOrders.map(order => renderOrderCard(order, true)).join('')}</div>`;
            } else {
                const myOrders = dashboardData?.myOrders || [];
                if (myOrders.length === 0) container.innerHTML = '<div class="card"><p style="text-align: center; color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📷 У вас пока нет назначенных заказов</p></div>';
                else container.innerHTML = `<h2 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📷 Мои заказы</h2><div class="orders-grid">${myOrders.map(order => renderOrderCard(order, false)).join('')}</div>`;
            }
        }
        
        window.switchTab = function(tab) { currentTab = tab; loadDashboard(); };
        
        window.acceptOrder = async function(orderId) {
            const response = await apiRequest(`/photographer/orders/${orderId}/accept`, { method: 'POST' });
            if (response.ok) { showAlert('✅ Заказ успешно принят!', 'success'); loadDashboard(); }
            else { const error = await response.json(); showAlert('❌ ' + (error.message || 'Ошибка'), 'error'); }
        };
        
        window.updateOrderStatus = async function(orderId) {
            const select = document.getElementById(`status_${orderId}`);
            const newStatus = parseInt(select.value);
            const response = await apiRequest(`/photographer/orders/${orderId}/status`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
            if (response.ok) { showAlert(`✅ Статус заказа #${orderId} обновлен`, 'success'); loadDashboard(); }
            else { showAlert('❌ Ошибка обновления статуса', 'error'); }
        };
        
        async function loadMyOrders() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/photographer/assigned-orders');
                const orders = await response.json();
                if (orders.length === 0) content.innerHTML = '<div class="card"><p style="text-align: center; color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📷 У вас пока нет назначенных заказов</p></div>';
                else content.innerHTML = `<div class="card"><h2 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📷 Мои назначенные заказы</h2><div class="orders-grid">${orders.map(order => renderOrderCard(order, false)).join('')}</div></div>`;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        }
        
        async function loadMySchedule() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/photographer/schedule');
                const schedule = await response.json();
                content.innerHTML = `<div class="card"><h2 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📅 Моё расписание</h2>
                    <button class="btn btn-primary" onclick="showAddScheduleModal()" style="margin-bottom:20px;">+ Добавить слот</button>
                    ${schedule.length === 0 ? '<p style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">Нет запланированных событий</p>' : `<div class="orders-grid">${schedule.map(slot => `
                        <div class="order-card"><div class="order-title" style="color: white; text-shadow: 0 0 3px #FF00FF;">📅 ${new Date(slot.startTime).toLocaleDateString()}</div>
                        <div class="order-info" style="color: white;">⏰ ${new Date(slot.startTime).toLocaleTimeString()} - ${new Date(slot.endTime).toLocaleTimeString()}</div>
                        <div class="order-info" style="color: white;">${slot.isAvailable ? '✓ Доступно' : '✗ Занято'}</div>
                        <button class="btn-status" onclick="deleteScheduleSlot(${slot.id})">🗑 Удалить</button></div>`).join('')}</div>`}</div>`;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        }
        
        window.showAddScheduleModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content"><h3 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">➕ Добавить слот в расписание</h3>
                <form id="addScheduleForm"><div class="form-group"><label style="color: white;">Дата и время начала</label><input type="datetime-local" id="startTime" required></div>
                <div class="form-group"><label style="color: white;">Дата и время окончания</label><input type="datetime-local" id="endTime" required></div>
                <div class="btn-group"><button type="submit" class="btn btn-primary">Сохранить</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">Отмена</button></div></form></div>`;
            document.body.appendChild(modal);
            document.getElementById('addScheduleForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const startTime = new Date(document.getElementById('startTime').value).toISOString();
                const endTime = new Date(document.getElementById('endTime').value).toISOString();
                const response = await apiRequest('/photographer/schedule', { method: 'POST', body: JSON.stringify({ startTime, endTime }) });
                if (response.ok) { showAlert('✅ Слот добавлен', 'success'); modal.remove(); loadMySchedule(); }
                else { showAlert('❌ Ошибка добавления', 'error'); }
            });
        };
        
        window.deleteScheduleSlot = async function(id) {
            if (confirm('Удалить этот слот?')) {
                const response = await apiRequest(`/schedule/${id}`, { method: 'DELETE' });
                if (response.ok) { showAlert('✅ Слот удален', 'success'); loadMySchedule(); }
                else { showAlert('❌ Ошибка: ' + error.message, 'error'); }
            }
        };
        
        window.loadDashboard = loadDashboard;
        window.loadMyOrders = loadMyOrders;
        window.loadMySchedule = loadMySchedule;
        
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadDashboard();
        }
    </script>
</body>
</html>
