<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Стили для страницы клиента в неоновой теме */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            color: var(--text-white);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
            color: var(--text-white-dim);
        }
        
        .order-form-container { max-width: 800px; margin: 0 auto; }
        .selected-services { background: rgba(30, 15, 40, 0.6); border-radius: 12px; padding: 15px; margin: 15px 0; }
        .service-tag { display: inline-block; background: var(--main-gradient); color: white; padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 12px; }
        .service-tag button { background: none; border: none; color: white; margin-left: 8px; cursor: pointer; font-weight: bold; }
        .total-price { font-size: 24px; font-weight: bold; color: var(--fuchsia); text-align: right; margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--fuchsia); }
        
        .photographer-card { border: 2px solid rgba(255, 0, 255, 0.3); border-radius: 12px; padding: 15px; margin: 10px 0; cursor: pointer; transition: all 0.3s; background: rgba(30, 15, 40, 0.6); color: var(--text-white); }
        .photographer-card.selected { border-color: var(--fuchsia); background: rgba(255, 0, 255, 0.15); box-shadow: var(--shadow-glow); }
        .photographer-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--fuchsia); }
        
        .time-slot { display: inline-block; background: rgba(30, 15, 40, 0.6); border: 1px solid rgba(255, 0, 255, 0.3); border-radius: 20px; padding: 8px 16px; margin: 5px; cursor: pointer; transition: all 0.3s; color: var(--text-white-dim); }
        .time-slot.selected { background: var(--main-gradient); color: white; border-color: var(--fuchsia); box-shadow: var(--shadow-glow); }
        .time-slot:hover { background: rgba(255, 0, 255, 0.2); color: white; }
        
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; }
        .step { flex: 1; text-align: center; padding: 10px; background: rgba(30, 15, 40, 0.6); border-radius: 10px; margin: 0 5px; font-size: 12px; color: var(--text-white-dim); }
        .step.active { background: var(--main-gradient); color: white; box-shadow: var(--shadow-glow); }
        .step.completed { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        
        .payment-methods-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 20px 0; }
        .payment-method-card { border: 2px solid rgba(255, 0, 255, 0.3); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; background: rgba(30, 15, 40, 0.6); color: var(--text-white); }
        .payment-method-card.selected { border-color: var(--fuchsia); background: rgba(255, 0, 255, 0.15); transform: translateY(-3px); box-shadow: var(--shadow-glow); }
        .payment-method-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--fuchsia); }
        .payment-icon { font-size: 48px; margin-bottom: 10px; }
        .payment-method-card h3 { margin-bottom: 8px; font-size: 18px; color: var(--text-white); }
        .payment-method-card p { font-size: 12px; color: var(--text-white-dim); margin-bottom: 10px; }
        .payment-badge { display: inline-block; padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-popular { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        .badge-installment { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); color: white; }
        
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .status-pending { background: rgba(254, 243, 199, 0.2); color: #fde047; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-confirmed { background: rgba(219, 234, 254, 0.2); color: #93c5fd; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-progress { background: rgba(252, 231, 243, 0.2); color: #f9a8d4; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-completed { background: rgba(209, 250, 229, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-cancelled { background: rgba(254, 226, 226, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .btn-cancel { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; margin-left: 10px; transition: all 0.3s; }
        .btn-cancel:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        
        .order-table { width: 100%; border-collapse: collapse; }
        .order-table th, .order-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 0, 255, 0.15); color: var(--text-white-dim); }
        .order-table th { background: rgba(179, 68, 108, 0.3); font-weight: 700; color: var(--text-white); }
        
        .services-grid-custom { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .service-card-custom { background: rgba(30, 15, 40, 0.8); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255, 0, 255, 0.2); position: relative; }
        .service-card-custom:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--fuchsia); }
        .service-card-custom.selected { border: 2px solid var(--fuchsia); box-shadow: var(--shadow-glow); }
        .service-image { height: 160px; background: linear-gradient(135deg, var(--crimson) 0%, var(--fuchsia) 50%, var(--neon-purple) 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; }
        .service-content { padding: 20px; }
        .service-content h4 { font-size: 18px; margin-bottom: 10px; color: var(--text-white); }
        .service-content p { color: var(--text-white-dim); font-size: 13px; margin-bottom: 12px; line-height: 1.4; }
        .service-price { font-size: 20px; font-weight: bold; background: var(--main-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .service-duration { float: right; color: var(--text-white-dim); font-size: 13px; }
        .service-check { position: absolute; top: 15px; right: 15px; background: #10b981; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .option-card { background: rgba(30, 15, 40, 0.6); border-radius: 16px; padding: 15px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; position: relative; color: var(--text-white); }
        .option-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--fuchsia); }
        .option-card.selected { border-color: var(--fuchsia); background: rgba(255, 0, 255, 0.15); box-shadow: var(--shadow-glow); }
        .option-icon { font-size: 32px; margin-bottom: 10px; }
        .option-name { font-weight: 600; color: var(--text-white); margin-bottom: 5px; }
        .option-price { font-size: 14px; color: var(--fuchsia); font-weight: bold; }
        .option-check { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; background: var(--fuchsia); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
        
        .order-summary { background: rgba(30, 15, 40, 0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-top: 30px; position: sticky; bottom: 20px; border: 1px solid rgba(255, 0, 255, 0.2); }
        .order-summary h4 { color: var(--text-white); margin-bottom: 15px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 0, 255, 0.1); color: var(--text-white-dim); }
        .order-total { display: flex; justify-content: space-between; padding: 15px 0; font-weight: bold; font-size: 18px; background: var(--main-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; border-top: 2px solid var(--fuchsia); }
        .btn-order { width: 100%; background: var(--main-gradient); color: white; padding: 15px; border: none; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 15px; }
        .btn-order:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-order:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-tab { padding: 8px 20px; background: rgba(30, 15, 40, 0.6); border-radius: 30px; cursor: pointer; transition: all 0.3s; font-size: 14px; color: var(--text-white-dim); border: 1px solid rgba(255, 0, 255, 0.2); }
        .filter-tab:hover { background: rgba(255, 0, 255, 0.15); transform: translateY(-2px); }
        .filter-tab.active { background: var(--main-gradient); color: white; box-shadow: var(--shadow-glow); border-color: transparent; }
        
        /* Эффекты для клиента в неоновой теме */
        .effects-grid-client {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .effect-card-client {
            background: rgba(30, 15, 40, 0.8);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 0, 255, 0.2);
            transition: all 0.3s;
            color: var(--text-white);
        }
        .effect-card-client:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            border-color: var(--fuchsia);
        }
        .effect-icon-client {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .effect-name-client {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-white);
            margin-bottom: 8px;
        }
        .effect-price-client {
            font-size: 20px;
            font-weight: bold;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }
        .effect-category-client {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 10px;
        }
        .category-effect { background: rgba(224, 231, 255, 0.2); color: #a78bfa; }
        .category-frame { background: rgba(252, 231, 243, 0.2); color: #f9a8d4; }
        .category-filter { background: rgba(209, 250, 229, 0.2); color: #6ee7b7; }
        
        .section-title-client {
            font-size: 24px;
            color: var(--text-white);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--fuchsia);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-white-dim);
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .services-grid-custom { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .effects-grid-client { grid-template-columns: 1fr; }
            .filter-tabs { justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../js/animations-light.js"></script>
    <script>
        const API_URL = 'https://localhost:7042/api';
        let currentToken = null;
        let currentUser = null;
        let selectedServices = [];
        let selectedPhotographer = null;
        let selectedTimeSlot = null;
        let selectedPaymentMethod = null;
        let selectedOptions = [];
        let services = [];
        let photographers = [];
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return false;
            }
            currentToken = token;
            currentUser = JSON.parse(user);
            return true;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`,
                    ...options.headers
                }
            });
            if (response.status === 401) {
                logout();
                throw new Error('Сессия истекла');
            }
            return response;
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.padding = '15px';
            alertDiv.style.borderRadius = '10px';
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function getStatusName(status) {
            const statuses = { 0: 'Ожидает', 1: 'Подтвержден', 2: 'В работе', 3: 'Выполнен', 4: 'Отменен' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getStatusClass(status) {
            const classes = { 0: 'status-pending', 1: 'status-confirmed', 2: 'status-progress', 3: 'status-completed', 4: 'status-cancelled' };
            return classes[status] || 'status-pending';
        }
        
        function getPaymentStatusText(status) {
            const statuses = { 0: '⏳ Не оплачен', 1: '🔄 Частично оплачен', 2: '✅ Оплачен', 3: '↩️ Возврат' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getPaymentStatusClass(status) {
            const classes = { 0: 'payment-status-notpaid', 1: 'payment-status-partial', 2: 'payment-status-paid', 3: 'payment-status-notpaid' };
            return classes[status] || 'payment-status-notpaid';
        }
        
        function getPaymentMethodText(method) {
            const methods = { 'card': '💳 Карта', 'cash': '💰 Наличные', 'online': '🏦 Онлайн перевод', 'installment': '📅 Рассрочка' };
            return methods[method] || method || 'Не указан';
        }
        
        function renderNavbar() {
            return `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-logo">📸 PhotoStudio CRM</div>
                        <div class="navbar-links">
                            <a onclick="loadDashboard()">🏠 Дашборд</a>
                            <a onclick="loadOrders()">📋 Мои заказы</a>
                            <a onclick="loadServicesWithOptions()">🎨 Выбрать услугу</a>
                        </div>
                        <div class="user-info">
                            <span class="user-name">👤 ${currentUser.firstName}</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                </div>
                <div class="container" id="pageContent"><div class="spinner"></div></div>
            `;
        }
        
        // Загрузка эффектов из localStorage (синхронизация с админ-панелью)
        function loadEffectsForClient() {
            let effects = [];
            const savedEffects = localStorage.getItem('photoStudioExtraOptions');
            
            if (savedEffects) {
                try {
                    effects = JSON.parse(savedEffects);
                } catch(e) {
                    effects = getDefaultEffects();
                }
            } else {
                effects = getDefaultEffects();
                localStorage.setItem('photoStudioExtraOptions', JSON.stringify(effects));
            }
            
            const availableEffects = effects.filter(e => e.isAvailable !== false);
            
            let effectsHtml = '';
            if (availableEffects.length > 0) {
                effectsHtml = `
                    <div class="card" style="margin-top: 30px;">
                        <h2 class="section-title-client">✨ Доступные эффекты и обработка</h2>
                        <div class="effects-grid-client">
                            ${availableEffects.map(effect => `
                                <div class="effect-card-client">
                                    <div class="effect-icon-client">${effect.icon || '✨'}</div>
                                    <span class="effect-category-client category-${effect.category}">${getCategoryName(effect.category)}</span>
                                    <div class="effect-name-client">${effect.name}</div>
                                    <div class="effect-price-client">+${effect.price} ₽</div>
                                    <div class="effect-description-client" style="font-size: 12px; color: var(--text-white-dim);">${effect.description || 'Профессиональная обработка'}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            return effectsHtml;
        }
        
        function getCategoryName(category) {
            if (category === 'effect') return '✨ Эффект';
            if (category === 'frame') return '🖼️ Рамка';
            if (category === 'filter') return '🎨 Фильтр';
            return '✨ Эффект';
        }
        
        function getDefaultEffects() {
            return [
                { id: 1, name: "Винтажный эффект", description: "Старение фото, пленочный эффект", price: 500, icon: "📷", category: "effect", isAvailable: true },
                { id: 2, name: "Черно-белый", description: "Классическое черно-белое фото", price: 300, icon: "⚫", category: "effect", isAvailable: true },
                { id: 3, name: "Цветокоррекция", description: "Профессиональная цветокоррекция", price: 800, icon: "🎨", category: "effect", isAvailable: true },
                { id: 4, name: "Глянец", description: "Эффект глянцевой поверхности", price: 400, icon: "✨", category: "effect", isAvailable: true },
                { id: 5, name: "Рамка", description: "Декоративная рамка для фото", price: 200, icon: "🖼️", category: "frame", isAvailable: true },
                { id: 6, name: "Свечение", description: "Мягкое свечение вокруг объекта", price: 600, icon: "💫", category: "effect", isAvailable: true },
                { id: 7, name: "Пленка", description: "Эффект старой пленки", price: 450, icon: "🎞️", category: "effect", isAvailable: true },
                { id: 8, name: "Звездная пыль", description: "Эффект звездной пыли", price: 700, icon: "🌟", category: "effect", isAvailable: true },
                { id: 9, name: "Розовая дымка", description: "Романтический розовый эффект", price: 550, icon: "💖", category: "effect", isAvailable: true },
                { id: 10, name: "Акварель", description: "Эффект акварельного рисунка", price: 650, icon: "🎨", category: "effect", isAvailable: true }
            ];
        }
        
        async function loadDashboard() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/dashboard');
                const text = await response.text();
                let stats = { totalOrders: 0, completedOrders: 0, pendingOrders: 0, totalSpent: 0 };
                let recentOrders = [];
                if (text && text.trim() !== '') {
                    try { const data = JSON.parse(text); stats = data.stats || stats; recentOrders = data.recentOrders || []; } catch(e) {}
                }
                
                const totalOrders = stats.totalOrders || 0;
                const completedOrders = stats.completedOrders || 0;
                const pendingOrders = stats.pendingOrders || 0;
                const totalSpent = stats.totalSpent || 0;
                
                content.innerHTML = `
                    <div style="margin-bottom:20px;">
                        <h1>Здравствуйте, ${currentUser.firstName}!</h1>
                        <p style="color: var(--text-white-dim);">Добро пожаловать в систему управления фотостудией</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="value">${totalOrders}</div>
                            <div class="label">Всего заказов</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${completedOrders}</div>
                            <div class="label">Выполнено</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${pendingOrders}</div>
                            <div class="label">В обработке</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${totalSpent.toLocaleString()} ₽</div>
                            <div class="label">Потрачено</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2>📋 Последние заказы</h2>
                        ${recentOrders.length > 0 ? renderOrdersTable(recentOrders) : '<div class="empty-state">У вас пока нет заказов. <button class="btn btn-primary" onclick="loadServicesWithOptions()">Создать заказ →</button></div>'}
                    </div>
                    
                    ${loadEffectsForClient()}
                `;
            } catch (error) { 
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; 
            }
        }
        
        function renderOrdersTable(orders) {
            if (!orders || orders.length === 0) return '<div class="empty-state">Нет заказов</div>';
            let html = '<table class="order-table"><thead><tr><th>ID</th><th>Дата</th><th>Сумма</th><th>Способ оплаты</th><th>Статус оплаты</th><th>Статус заказа</th><th>Действия</th></tr></thead><tbody>';
            orders.forEach(order => {
                const canCancel = order.status === 0 || order.status === 1;
                html += `<tr>
                    <td>${order.id}</td>
                    <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                    <td>${order.totalAmount} ₽}</td>
                    <td>${getPaymentMethodText(order.paymentMethod)}</td>
                    <td><span class="${getPaymentStatusClass(order.paymentStatus)}">${getPaymentStatusText(order.paymentStatus)}</span></td>
                    <td><span class="${getStatusClass(order.status)}">${getStatusName(order.status)}</span></td>
                    <td>${canCancel ? `<button class="btn-cancel" onclick="cancelOrder(${order.id})">❌ Отменить</button>` : '—'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            return html;
        }
        
        async function loadOrders() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/orders');
                const text = await response.text();
                let orders = [];
                if (text && text.trim() !== '') { try { orders = JSON.parse(text); } catch(e) {} }
                if (orders.length === 0) {
                    content.innerHTML = `<div class="card"><h2>Мои заказы</h2><div class="empty-state">У вас пока нет заказов</div><button class="btn btn-primary" onclick="loadServicesWithOptions()">Создать заказ</button></div>`;
                } else {
                    content.innerHTML = `<div class="card"><h2>Мои заказы</h2>${renderOrdersTable(orders)}</div>`;
                }
            } catch (error) { 
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; 
            }
        }
        
        window.cancelOrder = async function(orderId) {
            if (!confirm('Вы уверены, что хотите отменить этот заказ?')) return;
            try {
                const response = await apiRequest(`/client/orders/${orderId}/cancel`, { method: 'PUT' });
                if (response.ok) { showAlert('✅ Заказ успешно отменен', 'success'); loadOrders(); loadDashboard(); }
                else { showAlert('❌ Ошибка отмены заказа', 'error'); }
            } catch (error) { showAlert('❌ Ошибка: ' + error.message, 'error'); }
        };
        
        // ============ ВЫБОР УСЛУГИ С ЭФФЕКТАМИ ============
        
        async function loadServicesWithOptions() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            selectedServices = [];
            selectedOptions = [];
            selectedPhotographer = null;
            selectedTimeSlot = null;
            selectedPaymentMethod = null;
            
            try {
                const response = await fetch(`${API_URL}/services`);
                const text = await response.text();
                if (!text || text.trim() === '') throw new Error('Нет доступных услуг');
                services = JSON.parse(text);
                renderServicesCatalog();
            } catch (error) {
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`;
            }
        }
        
        function renderServicesCatalog() {
            const content = document.getElementById('pageContent');
            
            let availableOptions = [];
            const savedEffects = localStorage.getItem('photoStudioExtraOptions');
            if (savedEffects) {
                try {
                    availableOptions = JSON.parse(savedEffects);
                } catch(e) {}
            }
            if (!availableOptions || availableOptions.length === 0) {
                availableOptions = getDefaultEffects();
            }
            
            const totalPrice = selectedServices.reduce((sum, s) => sum + s.price, 0) + selectedOptions.reduce((sum, o) => sum + o.price, 0);
            
            const servicesHtml = services.map(service => {
                const icon = getServiceIcon(service.name);
                const isSelected = selectedServices.some(s => s.id === service.id);
                return `
                    <div class="service-card-custom ${isSelected ? 'selected' : ''}" onclick="toggleService(${service.id}, '${service.name}', ${service.price})">
                        ${isSelected ? '<div class="service-check">✓</div>' : ''}
                        <div class="service-image">${icon}</div>
                        <div class="service-content">
                            <h4>${service.name}</h4>
                            <p>${service.description || 'Профессиональная фотосъемка'}</p>
                            <div><span class="service-price">${service.price.toLocaleString()} ₽</span><span class="service-duration">⏱ ${service.durationMinutes} мин</span></div>
                        </div>
                    </div>
                `;
            }).join('');
            
            const optionsHtml = availableOptions.map(opt => `
                <div class="option-card" onclick="toggleOption(${opt.id}, '${opt.name}', ${opt.price}, '${opt.icon || '✨'}')" id="opt-${opt.id}">
                    <div class="option-icon">${opt.icon || '✨'}</div>
                    <div class="option-name">${opt.name}</div>
                    <div class="option-price">+${opt.price} ₽</div>
                    <div style="font-size: 11px; color: var(--text-white-dim); margin-top: 5px;">${opt.description || 'Профессиональная обработка'}</div>
                    ${selectedOptions.some(o => o.id === opt.id) ? '<div class="option-check">✓</div>' : ''}
                </div>
            `).join('');
            
            content.innerHTML = `
                <div class="services-catalog">
                    <h1 style="margin-bottom:30px;">🎨 Выберите услугу и эффекты</h1>
                    <div class="filter-tabs">
                        <div class="filter-tab active" onclick="filterServices('all')">Все услуги</div>
                        <div class="filter-tab" onclick="filterServices('photo')">Фотосессии</div>
                        <div class="filter-tab" onclick="filterServices('video')">Видеосъемка</div>
                        <div class="filter-tab" onclick="filterServices('edit')">Обработка</div>
                    </div>
                    <div id="servicesListContainer"><div class="services-grid-custom">${servicesHtml}</div></div>
                    <div class="options-title" style="margin-top:30px; color: var(--text-white);">✨ Добавить эффекты и обработку</div>
                    <div class="options-grid" id="optionsGrid">${optionsHtml}</div>
                    <div class="order-summary">
                        <h4>🛒 Ваш заказ</h4>
                        <div id="orderSummaryItems">
                            ${selectedServices.length === 0 ? '<div class="order-item">Выберите услугу</div>' : selectedServices.map(s => `<div class="order-item"><span>${s.name}</span><span>${s.price} ₽</span></div>`).join('')}
                            ${selectedOptions.map(opt => `<div class="order-item"><span>${opt.icon || '✨'} ${opt.name}</span><span>+${opt.price} ₽</span></div>`).join('')}
                        </div>
                        <div class="order-total"><span>Итого:</span><span>${totalPrice} ₽</span></div>
                        <button class="btn-order" onclick="proceedToCheckout()" ${selectedServices.length === 0 ? 'disabled' : ''}>✅ Продолжить оформление</button>
                    </div>
                </div>
            `;
        }
        
        window.toggleService = function(id, name, price) {
            const index = selectedServices.findIndex(s => s.id === id);
            if (index === -1) { selectedServices.push({ id, name, price }); } 
            else { selectedServices.splice(index, 1); }
            renderServicesCatalog();
        };
        
        window.toggleOption = function(optId, optName, optPrice, optIcon) {
            const index = selectedOptions.findIndex(o => o.id === optId);
            if (index === -1) { selectedOptions.push({ id: optId, name: optName, price: optPrice, icon: optIcon }); } 
            else { selectedOptions.splice(index, 1); }
            renderServicesCatalog();
        };
        
        window.filterServices = function(filter) {
            const container = document.getElementById('servicesListContainer');
            let filteredServices = services;
            if (filter === 'photo') filteredServices = services.filter(s => s.name.includes('Портрет') || s.name.includes('Свадеб') || s.name.includes('Love') || s.name.includes('Семейн') || s.name.includes('Детск') || s.name.includes('Беремен'));
            else if (filter === 'video') filteredServices = services.filter(s => s.name.includes('Видео'));
            else if (filter === 'edit') filteredServices = services.filter(s => s.name.includes('Ретуш') || s.name.includes('Обработк'));
            
            const servicesHtml = filteredServices.map(service => {
                const icon = getServiceIcon(service.name);
                const isSelected = selectedServices.some(s => s.id === service.id);
                return `<div class="service-card-custom ${isSelected ? 'selected' : ''}" onclick="toggleService(${service.id}, '${service.name}', ${service.price})">
                    ${isSelected ? '<div class="service-check">✓</div>' : ''}
                    <div class="service-image">${icon}</div>
                    <div class="service-content">
                        <h4>${service.name}</h4>
                        <p>${service.description || 'Профессиональная фотосъемка'}</p>
                        <div><span class="service-price">${service.price.toLocaleString()} ₽</span><span class="service-duration">⏱ ${service.durationMinutes} мин</span></div>
                    </div>
                </div>`;
            }).join('');
            container.innerHTML = `<div class="services-grid-custom">${servicesHtml}</div>`;
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
        };
        
        function getServiceIcon(name) {
            const icons = { 'Портрет': '📸', 'Свадеб': '💍', 'Love': '💕', 'Семейн': '👨‍👩‍👧‍👦', 'Детск': '🧸', 'Беремен': '🤰', 'Предмет': '📦', 'Ретуш': '🎨', 'Аренд': '🏠', 'Видео': '🎥' };
            for (const [key, icon] of Object.entries(icons)) { if (name.includes(key)) return icon; }
            return '📷';
        }
        
        async function proceedToCheckout() {
            if (selectedServices.length === 0) { showAlert('Сначала выберите услугу', 'error'); return; }
            await loadPhotographersForOrder();
        }
        
        async function loadPhotographersForOrder() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/photographers');
                const text = await response.text();
                if (!text || text.trim() === '') throw new Error('Сервер вернул пустой ответ');
                photographers = JSON.parse(text);
                if (photographers.length === 0) throw new Error('Нет активных фотографов');
                renderPhotographerSelection();
            } catch (error) {
                content.innerHTML = `
                    <div class="card" style="max-width:600px; margin:0 auto;">
                        <h2>❌ Ошибка загрузки фотографов</h2>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadServicesWithOptions()">← Вернуться к услугам</button>
                    </div>
                `;
            }
        }
        
        function renderPhotographerSelection() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card" style="max-width:600px; margin:0 auto;">
                    <h2>📷 Выберите фотографа</h2>
                    <div id="photographersList">
                        ${photographers.map(p => `
                            <div class="photographer-card" onclick="selectPhotographer(${p.id}, '${p.firstName} ${p.lastName}')" id="photog_${p.id}">
                                <div style="display:flex; align-items:center; gap:15px;">
                                    <div style="font-size:40px;">📸</div>
                                    <div><h3>${p.firstName} ${p.lastName}</h3><p>${p.email}</p></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-secondary" onclick="loadServicesWithOptions()">← Назад к услугам</button>
                </div>
            `;
        }
        
        window.selectPhotographer = function(id, name) {
            selectedPhotographer = { id, name };
            renderDateTimeSelection();
        };
        
        function renderDateTimeSelection() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card" style="max-width:600px; margin:0 auto;">
                    <h2>⏰ Выберите дату и время</h2>
                    <div class="form-group"><label>Дата</label><input type="date" id="orderDate" min="${new Date().toISOString().split('T')[0]}"></div>
                    <div class="form-group">
                        <label>Время</label>
                        <select id="orderTime">
                            <option value="10:00">10:00</option><option value="11:00">11:00</option><option value="12:00">12:00</option>
                            <option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option>
                            <option value="16:00">16:00</option><option value="17:00">17:00</option><option value="18:00">18:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Способ оплаты</label>
                        <select id="paymentMethodSelect">
                            <option value="card">💳 Банковская карта</option><option value="cash">💰 Наличные</option>
                            <option value="online">🏦 Онлайн перевод</option><option value="installment">📅 Рассрочка</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="createFinalOrder()">✅ Подтвердить заказ</button>
                    <button class="btn btn-secondary" onclick="loadPhotographersForOrder()">← Назад</button>
                </div>
            `;
        }
        
        async function createFinalOrder() {
            const orderDate = document.getElementById('orderDate').value;
            const orderTime = document.getElementById('orderTime').value;
            const paymentMethod = document.getElementById('paymentMethodSelect').value;
            
            if (!orderDate) { showAlert('Выберите дату', 'error'); return; }
            if (!selectedPhotographer) { showAlert('Выберите фотографа', 'error'); return; }
            
            const totalPrice = selectedServices.reduce((sum, s) => sum + s.price, 0) + selectedOptions.reduce((sum, o) => sum + o.price, 0);
            const optionsText = selectedOptions.length > 0 ? `, Эффекты: ${selectedOptions.map(o => o.name).join(', ')}` : '';
            const notes = `Фотограф: ${selectedPhotographer.name}, Дата: ${orderDate} ${orderTime}${optionsText}`;
            
            try {
                const response = await apiRequest('/client/orders', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        serviceIds: selectedServices.map(s => s.id),
                        notes: notes,
                        paymentMethod: paymentMethod
                    })
                });
                
                if (response.ok) {
                    showAlert('✅ Заказ успешно создан! Мы свяжемся с вами для подтверждения.', 'success');
                    loadDashboard();
                } else {
                    const error = await response.text();
                    showAlert('❌ Ошибка при создании заказа: ' + error, 'error');
                }
            } catch (error) {
                showAlert('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        window.loadDashboard = loadDashboard;
        window.loadOrders = loadOrders;
        window.loadServicesWithOptions = loadServicesWithOptions;
        
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadDashboard();
        }
    </script>
</body>
</html>
