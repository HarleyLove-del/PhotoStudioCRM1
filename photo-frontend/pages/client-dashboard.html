<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиент - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Стили для страницы клиента в неоновой теме */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .photographer-card { border: 2px solid rgba(255, 0, 255, 0.3); border-radius: 12px; padding: 15px; margin: 10px 0; cursor: pointer; transition: all 0.3s; background: rgba(30, 15, 40, 0.6); color: white; }
        .photographer-card.selected { border-color: #FF00FF; background: rgba(255, 0, 255, 0.15); box-shadow: var(--shadow-glow); }
        .photographer-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: #FF00FF; }
        
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        
        .status-pending { background: rgba(254, 243, 199, 0.2); color: #fde047; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-confirmed { background: rgba(219, 234, 254, 0.2); color: #93c5fd; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-progress { background: rgba(252, 231, 243, 0.2); color: #f9a8d4; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-completed { background: rgba(209, 250, 229, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        .status-cancelled { background: rgba(254, 226, 226, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; white-space: nowrap; }
        
        .btn-cancel { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.3s; white-space: nowrap; }
        .btn-cancel:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        
        .btn-pay { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.3s; white-space: nowrap; }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .order-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }
        .order-table th, .order-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: white;
            white-space: nowrap;
            vertical-align: middle;
        }
        .order-table th {
            background: rgba(179, 68, 108, 0.3);
            font-weight: 700;
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .order-table td .status-badge, 
        .order-table td .payment-status {
            white-space: nowrap;
            display: inline-block;
        }
        
        .services-grid-custom { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .service-card-custom { background: rgba(30, 15, 40, 0.8); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255, 0, 255, 0.2); position: relative; }
        .service-card-custom:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: #FF00FF; }
        .service-card-custom.selected { border: 2px solid #FF00FF; box-shadow: var(--shadow-glow); }
        .service-image { height: 160px; background: linear-gradient(135deg, var(--crimson) 0%, var(--fuchsia) 50%, var(--neon-purple) 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; }
        .service-content { padding: 20px; }
        .service-content h4 { font-size: 18px; margin-bottom: 10px; color: white; text-shadow: 0 0 3px #FF00FF; }
        .service-content p { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 12px; line-height: 1.4; }
        .service-price { font-size: 20px; font-weight: bold; color: #FF66FF; text-shadow: 0 0 3px #FF00FF; }
        .service-duration { float: right; color: rgba(255,255,255,0.8); font-size: 13px; }
        .service-check { position: absolute; top: 15px; right: 15px; background: #10b981; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .option-card { background: rgba(30, 15, 40, 0.6); border-radius: 16px; padding: 15px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; position: relative; color: white; }
        .option-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #FF00FF; }
        .option-card.selected { border-color: #FF00FF; background: rgba(255, 0, 255, 0.15); box-shadow: var(--shadow-glow); }
        .option-icon { font-size: 32px; margin-bottom: 10px; }
        .option-name { font-weight: 600; color: white; margin-bottom: 5px; text-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .option-price { font-size: 14px; color: #FF66FF; font-weight: bold; text-shadow: 0 0 2px #FF00FF; }
        .option-check { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; background: #FF00FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
        
        .order-summary { background: rgba(30, 15, 40, 0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-top: 30px; position: sticky; bottom: 20px; border: 1px solid rgba(255, 0, 255, 0.2); }
        .order-summary h4 { color: white; margin-bottom: 15px; text-shadow: 0 0 3px #FF00FF; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 0, 255, 0.1); color: rgba(255,255,255,0.8); }
        .order-total { display: flex; justify-content: space-between; padding: 15px 0; font-weight: bold; font-size: 18px; color: #FF66FF; border-top: 2px solid #FF00FF; text-shadow: 0 0 3px #FF00FF; }
        .btn-order { width: 100%; background: var(--main-gradient); color: white; padding: 15px; border: none; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 15px; text-shadow: 0 0 3px rgba(0,0,0,0.5); }
        .btn-order:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-order:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .section-title-client {
            font-size: 24px;
            color: white;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FF00FF;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.7);
        }
        
        .card h2 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .card p {
            color: white;
        }
        
        /* Модальное окно для оплаты */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #1e0f28 0%, #2a1a38 100%);
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 {
            color: white;
            text-shadow: 0 0 5px #FF00FF;
            margin-bottom: 20px;
        }
        .modal-content .form-group {
            margin-bottom: 20px;
        }
        .modal-content label {
            color: rgba(255,255,255,0.8);
            display: block;
            margin-bottom: 8px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            background: rgba(30, 15, 40, 0.8);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: #FF00FF;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-modal-confirm {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
        }
        .btn-modal-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        .btn-modal-cancel {
            background: rgba(239, 68, 68, 0.3);
            color: white;
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
        .btn-modal-cancel:hover {
            background: rgba(239, 68, 68, 0.5);
        }
        .payment-summary {
            background: rgba(255, 0, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .payment-summary .amount {
            font-size: 28px;
            font-weight: bold;
            color: #FF66FF;
            text-shadow: 0 0 5px #FF00FF;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .services-grid-custom { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .order-table { min-width: 800px; }
            .order-table th, .order-table td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <!-- Модальное окно оплаты -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h3>💳 Оплата заказа</h3>
            <div id="modalOrderInfo"></div>
            <div class="form-group">
                <label>💰 Сумма оплаты (₽)</label>
                <input type="number" id="paymentAmount" step="1" min="1">
                <small style="color: rgba(255,255,255,0.6); display: block; margin-top: 5px;">Можно оплатить полностью или частично (предоплата)</small>
            </div>
            <div class="form-group">
                <label>💳 Способ оплаты</label>
                <select id="paymentMethodModal">
                    <option value="card">💳 Банковская карта (онлайн)</option>
                    <option value="online">🏦 Онлайн перевод (СБП)</option>
                    <option value="cash">💰 Наличные в студии</option>
                </select>
            </div>
            <div class="payment-summary" id="paymentSummary">
                <div>К оплате:</div>
                <div class="amount" id="modalAmount">0 ₽</div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closePaymentModal()">Отмена</button>
                <button class="btn-modal-confirm" id="confirmPayBtn" onclick="processPayment()">✅ Оплатить</button>
            </div>
        </div>
    </div>
    
    <script src="../js/animations-light.js"></script>
    <script>
        const API_URL = 'https://localhost:7042/api';
        let currentToken = null;
        let currentUser = null;
        let selectedServices = [];
        let selectedPhotographer = null;
        let selectedOptions = [];
        let services = [];
        let photographers = [];
        
        let currentPaymentOrderData = null;
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return false;
            }
            currentToken = token;
            currentUser = JSON.parse(user);
            return true;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${currentToken}`,
                    ...options.headers
                }
            });
            if (response.status === 401) {
                logout();
                throw new Error('Сессия истекла');
            }
            return response;
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.padding = '15px';
            alertDiv.style.borderRadius = '10px';
            alertDiv.style.backgroundColor = type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 'rgba(16, 185, 129, 0.9)';
            alertDiv.style.color = 'white';
            alertDiv.style.backdropFilter = 'blur(10px)';
            alertDiv.style.zIndex = '10001';
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function getStatusName(status) {
            const statuses = { 0: 'Ожидает', 1: 'Подтвержден', 2: 'В работе', 3: 'Выполнен', 4: 'Отменен' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getStatusClass(status) {
            const classes = { 0: 'status-pending', 1: 'status-confirmed', 2: 'status-progress', 3: 'status-completed', 4: 'status-cancelled' };
            return classes[status] || 'status-pending';
        }
        
        function getPaymentStatusText(status) {
            const statuses = { 0: '⏳ Не оплачен', 1: '🔄 Частично оплачен', 2: '✅ Оплачен', 3: '↩️ Возврат' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getPaymentStatusClass(status) {
            const classes = { 0: 'payment-status-notpaid', 1: 'payment-status-partial', 2: 'payment-status-paid', 3: 'payment-status-notpaid' };
            return classes[status] || 'payment-status-notpaid';
        }
        
        function getPaymentMethodText(method) {
            const methods = { 'card': '💳 Карта', 'cash': '💰 Наличные', 'online': '🏦 Онлайн перевод', 'installment': '📅 Рассрочка' };
            return methods[method] || method || 'Не указан';
        }
        
        function renderNavbar() {
            return `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-logo" style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📸 PhotoStudio CRM</div>
                        <div class="navbar-links">
                            <a onclick="loadDashboard()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">🏠 Дашборд</a>
                            <a onclick="loadOrders()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📋 Мои заказы</a>
                            <a onclick="loadServicesWithOptions()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">🎨 Выбрать услугу</a>
                        </div>
                        <div class="user-info">
                            <span class="user-name" style="color: white; text-shadow: 0 0 3px #FF00FF;">👤 ${currentUser.firstName}</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                </div>
                <div class="container" id="pageContent"><div class="spinner"></div></div>
            `;
        }
        
        function getDefaultEffects() {
            return [
                { id: 1, name: "Винтажный эффект", price: 500, icon: "📷", isAvailable: true },
                { id: 2, name: "Черно-белый", price: 300, icon: "⚫", isAvailable: true },
                { id: 3, name: "Цветокоррекция", price: 800, icon: "🎨", isAvailable: true },
                { id: 4, name: "Глянец", price: 400, icon: "✨", isAvailable: true },
                { id: 5, name: "Рамка", price: 200, icon: "🖼️", isAvailable: true },
                { id: 6, name: "Свечение", price: 600, icon: "💫", isAvailable: true },
                { id: 7, name: "Пленка", price: 450, icon: "🎞️", isAvailable: true },
                { id: 8, name: "Звездная пыль", price: 700, icon: "🌟", isAvailable: true }
            ];
        }
        
        // Функция для расчёта общей суммы потраченных средств
        function calculateTotalSpent(orders) {
            if (!orders || orders.length === 0) return 0;
            
            let totalSpent = 0;
            orders.forEach(order => {
                // Если заказ оплачен полностью
                if (order.paymentStatus === 2) {
                    totalSpent += (order.totalAmount || 0);
                }
                // Если заказ оплачен частично - добавляем только оплаченную сумму
                else if (order.paymentStatus === 1 && order.paidAmount) {
                    totalSpent += (order.paidAmount || 0);
                }
                // Если заказ имеет записи о платежах, суммируем их
                else if (order.payments && order.payments.length > 0) {
                    const paidSum = order.payments.reduce((sum, p) => sum + (p.amount || 0), 0);
                    totalSpent += paidSum;
                }
                // Если есть поле paidAmount
                else if (order.paidAmount) {
                    totalSpent += order.paidAmount;
                }
            });
            return totalSpent;
        }
        
        async function loadDashboard() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/dashboard');
                const text = await response.text();
                let stats = { totalOrders: 0, completedOrders: 0, pendingOrders: 0, totalSpent: 0 };
                let recentOrders = [];
                let allOrders = [];
                
                if (text && text.trim() !== '') {
                    try { 
                        const data = JSON.parse(text); 
                        stats = data.stats || stats; 
                        recentOrders = data.recentOrders || [];
                        allOrders = data.allOrders || data.orders || [];
                    } catch(e) {}
                }
                
                // Если в ответе нет allOrders, загружаем заказы отдельно
                if (allOrders.length === 0 && recentOrders.length > 0) {
                    try {
                        const ordersResponse = await apiRequest('/client/orders');
                        const ordersText = await ordersResponse.text();
                        if (ordersText && ordersText.trim() !== '') {
                            allOrders = JSON.parse(ordersText);
                        }
                    } catch(e) {}
                }
                
                // Рассчитываем реальную сумму потраченных средств
                let totalSpent = stats.totalSpent || 0;
                if (allOrders.length > 0) {
                    totalSpent = calculateTotalSpent(allOrders);
                } else if (recentOrders.length > 0) {
                    totalSpent = calculateTotalSpent(recentOrders);
                }
                
                content.innerHTML = `
                    <div style="margin-bottom:20px;">
                        <h1 style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">Здравствуйте, ${currentUser.firstName}!</h1>
                        <p style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">Добро пожаловать в систему управления фотостудией</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="value">${stats.totalOrders || 0}</div><div class="label">Всего заказов</div></div>
                        <div class="stat-card"><div class="value">${stats.completedOrders || 0}</div><div class="label">Выполнено</div></div>
                        <div class="stat-card"><div class="value">${stats.pendingOrders || 0}</div><div class="label">В обработке</div></div>
                        <div class="stat-card"><div class="value">${totalSpent.toLocaleString()} ₽</div><div class="label">Потрачено</div></div>
                    </div>
                    <div class="card">
                        <h2>📋 Последние заказы</h2>
                        ${recentOrders.length > 0 ? renderOrdersTable(recentOrders) : '<div class="empty-state">У вас пока нет заказов. <button class="btn btn-primary" onclick="loadServicesWithOptions()">Создать заказ →</button></div>'}
                    </div>
                `;
            } catch (error) { 
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; 
            }
        }
        
        function renderOrdersTable(orders) {
            if (!orders || orders.length === 0) return '<div class="empty-state">Нет заказов</div>';
            let html = `
                <div class="table-responsive">
                    <table class="order-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Дата</th>
                                <th>Сумма</th>
                                <th>Способ оплаты</th>
                                <th>Статус оплаты</th>
                                <th>Статус заказа</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            orders.forEach(order => {
                const canCancel = order.status === 0 || order.status === 1;
                const canPay = (order.paymentStatus !== 2) && order.status !== 4;
                const remainingAmount = (order.totalAmount || 0) - (order.paidAmount || 0);
                const displayRemaining = remainingAmount > 0 ? remainingAmount : 0;
                const paidAmount = order.paidAmount || 0;
                
                let paymentStatusHtml = `<span class="${getPaymentStatusClass(order.paymentStatus)}">${getPaymentStatusText(order.paymentStatus)}</span>`;
                if (order.paymentStatus === 1 && paidAmount > 0) {
                    paymentStatusHtml += `<br><small style="font-size:10px; white-space:nowrap;">Оплачено: ${paidAmount.toLocaleString()} ₽</small>`;
                }
                if (displayRemaining > 0 && order.paymentStatus !== 2) {
                    paymentStatusHtml += `<br><small style="font-size:10px; color:#fcd34d; white-space:nowrap;">Остаток: ${displayRemaining.toLocaleString()} ₽</small>`;
                }
                
                html += `<tr>
                    <td>${order.id}</td>
                    <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                    <td>${(order.totalAmount || 0).toLocaleString()} ₽</td>
                    <td>${getPaymentMethodText(order.paymentMethod)}</td>
                    <td>${paymentStatusHtml}</td>
                    <td><span class="${getStatusClass(order.status)}">${getStatusName(order.status)}</span></td>
                    <td>
                        ${canCancel ? `<button class="btn-cancel" onclick="cancelOrder(${order.id})">❌ Отменить</button>` : ''}
                        ${canPay && displayRemaining > 0 ? `<button class="btn-pay" onclick="openPaymentModal(${order.id}, ${order.totalAmount || 0}, ${paidAmount})">💰 Оплатить</button>` : ''}
                        ${canPay && displayRemaining <= 0 && order.paymentStatus === 2 ? `<span style="color:#6ee7b7;">✓ Оплачено</span>` : ''}
                    </td>
                </tr>`;
            });
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            return html;
        }
        
        window.openPaymentModal = function(orderId, totalAmount, paidAmount = 0) {
            currentPaymentOrderData = {
                id: orderId,
                totalAmount: totalAmount,
                paidAmount: paidAmount,
                remainingAmount: totalAmount - paidAmount
            };
            const remaining = currentPaymentOrderData.remainingAmount;
            
            document.getElementById('modalOrderInfo').innerHTML = `
                <div class="payment-summary">
                    <div>Заказ #${orderId}</div>
                    <div>Общая сумма: <strong style="color:#FF66FF;">${totalAmount.toLocaleString()} ₽</strong></div>
                    <div>Остаток: <strong style="color:#fcd34d;">${remaining.toLocaleString()} ₽</strong></div>
                </div>
            `;
            const amountInput = document.getElementById('paymentAmount');
            amountInput.value = remaining;
            amountInput.max = remaining;
            amountInput.min = 1;
            document.getElementById('modalAmount').innerText = `${remaining.toLocaleString()} ₽`;
            amountInput.oninput = function() {
                let val = parseFloat(this.value) || 0;
                if (val > remaining) val = remaining;
                if (val < 1) val = 1;
                this.value = val;
                document.getElementById('modalAmount').innerText = `${val.toLocaleString()} ₽`;
            };
            document.getElementById('paymentModal').classList.add('active');
        };
        
        window.closePaymentModal = function() {
            document.getElementById('paymentModal').classList.remove('active');
            currentPaymentOrderData = null;
        };
        
        window.processPayment = async function() {
            const confirmBtn = document.getElementById('confirmPayBtn');
            if (!currentPaymentOrderData || !currentPaymentOrderData.id) {
                showAlert('❌ Ошибка: данные заказа не найдены', 'error');
                closePaymentModal();
                return;
            }
            
            const paymentAmount = parseFloat(document.getElementById('paymentAmount').value);
            const paymentMethod = document.getElementById('paymentMethodModal').value;
            
            if (isNaN(paymentAmount) || paymentAmount <= 0) {
                showAlert('❌ Введите корректную сумму', 'error');
                return;
            }
            
            const remaining = currentPaymentOrderData.remainingAmount;
            if (paymentAmount > remaining) {
                showAlert(`❌ Сумма не может превышать остаток (${remaining.toLocaleString()} ₽)`, 'error');
                return;
            }
            
            const originalText = confirmBtn.innerHTML;
            confirmBtn.innerHTML = '⏳ Обработка...';
            confirmBtn.disabled = true;
            
            try {
                const requestBody = { orderId: currentPaymentOrderData.id, amount: paymentAmount, paymentMethod: paymentMethod };
                const response = await apiRequest('/client/payments', { method: 'POST', body: JSON.stringify(requestBody) });
                
                if (response.ok) {
                    showAlert(`✅ Оплата прошла успешно! Сумма: ${paymentAmount.toLocaleString()} ₽`, 'success');
                    closePaymentModal();
                    await loadOrders();
                    await loadDashboard();
                } else {
                    const errorText = await response.text();
                    showAlert(`❌ Ошибка оплаты (${response.status}): ${errorText}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                confirmBtn.innerHTML = originalText;
                confirmBtn.disabled = false;
            }
        };
        
        async function loadOrders() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/orders');
                const text = await response.text();
                let orders = [];
                if (text && text.trim() !== '') { 
                    try { orders = JSON.parse(text); } catch(e) {} 
                }
                if (orders.length === 0) {
                    content.innerHTML = `<div class="card"><h2>Мои заказы</h2><div class="empty-state">У вас пока нет заказов</div><button class="btn btn-primary" onclick="loadServicesWithOptions()">Создать заказ</button></div>`;
                } else {
                    content.innerHTML = `<div class="card"><h2>Мои заказы</h2>${renderOrdersTable(orders)}</div>`;
                }
            } catch (error) { 
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; 
            }
        }
        
        window.cancelOrder = async function(orderId) {
            if (!confirm('Отменить заказ?')) return;
            try {
                const response = await apiRequest(`/client/orders/${orderId}/cancel`, { method: 'PUT' });
                if (response.ok) { showAlert('✅ Заказ отменен', 'success'); loadOrders(); loadDashboard(); }
                else { showAlert('❌ Ошибка отмены', 'error'); }
            } catch (error) { showAlert('❌ Ошибка: ' + error.message, 'error'); }
        };
        
        // ============ ВЫБОР УСЛУГ ============
        
        async function loadServicesWithOptions() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            selectedServices = [];
            selectedOptions = [];
            selectedPhotographer = null;
            
            try {
                const response = await fetch(`${API_URL}/services`);
                const text = await response.text();
                if (!text || text.trim() === '') throw new Error('Нет доступных услуг');
                services = JSON.parse(text);
                renderServicesCatalog();
            } catch (error) {
                content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`;
            }
        }
        
        function renderServicesCatalog() {
            const content = document.getElementById('pageContent');
            
            let availableOptions = [];
            const savedEffects = localStorage.getItem('photoStudioExtraOptions');
            if (savedEffects) {
                try { availableOptions = JSON.parse(savedEffects); } catch(e) {}
            }
            if (!availableOptions || availableOptions.length === 0) {
                availableOptions = getDefaultEffects();
            }
            
            const totalPrice = selectedServices.reduce((sum, s) => sum + s.price, 0) + selectedOptions.reduce((sum, o) => sum + o.price, 0);
            
            const servicesHtml = services.map(service => {
                const icon = getServiceIcon(service.name);
                const isSelected = selectedServices.some(s => s.id === service.id);
                return `
                    <div class="service-card-custom ${isSelected ? 'selected' : ''}" onclick="toggleService(${service.id}, '${service.name}', ${service.price})">
                        ${isSelected ? '<div class="service-check">✓</div>' : ''}
                        <div class="service-image">${icon}</div>
                        <div class="service-content">
                            <h4>${service.name}</h4>
                            <p>${service.description || 'Профессиональная фотосъемка'}</p>
                            <div><span class="service-price">${service.price.toLocaleString()} ₽</span></div>
                        </div>
                    </div>
                `;
            }).join('');
            
            const optionsHtml = availableOptions.map(opt => `
                <div class="option-card" onclick="toggleOption(${opt.id}, '${opt.name}', ${opt.price}, '${opt.icon || '✨'}')" id="opt-${opt.id}">
                    <div class="option-icon">${opt.icon || '✨'}</div>
                    <div class="option-name">${opt.name}</div>
                    <div class="option-price">+${opt.price} ₽</div>
                    <div style="font-size: 11px; color: rgba(255,255,255,0.7);">${opt.description || 'Профессиональная обработка'}</div>
                    ${selectedOptions.some(o => o.id === opt.id) ? '<div class="option-check">✓</div>' : ''}
                </div>
            `).join('');
            
            content.innerHTML = `
                <div class="services-catalog">
                    <h1 style="margin-bottom:30px; color: white; text-shadow: 0 0 5px #FF00FF;">🎨 Выберите услугу</h1>
                    <div id="servicesListContainer">
                        ${services.length === 0 ? '<div class="empty-state">Нет доступных услуг</div>' : `<div class="services-grid-custom">${servicesHtml}</div>`}
                    </div>
                    <h2 style="color: white; margin-top: 30px;">✨ Дополнительные эффекты и обработка</h2>
                    <div class="options-grid" id="optionsGrid">${optionsHtml}</div>
                    <div class="order-summary">
                        <div class="order-total"><span>Итого:</span><span>${totalPrice} ₽</span></div>
                        <button class="btn-order" onclick="proceedToCheckout()" ${selectedServices.length === 0 ? 'disabled' : ''}>✅ Продолжить оформление</button>
                    </div>
                </div>
            `;
        }
        
        window.toggleService = function(id, name, price) {
            const index = selectedServices.findIndex(s => s.id === id);
            if (index === -1) { selectedServices.push({ id, name, price }); } 
            else { selectedServices.splice(index, 1); }
            renderServicesCatalog();
        };
        
        window.toggleOption = function(optId, optName, optPrice, optIcon) {
            const index = selectedOptions.findIndex(o => o.id === optId);
            if (index === -1) { selectedOptions.push({ id: optId, name: optName, price: optPrice, icon: optIcon }); } 
            else { selectedOptions.splice(index, 1); }
            renderServicesCatalog();
        };
        
        function getServiceIcon(name) {
            const icons = { 'Портрет': '📸', 'Свадеб': '💍', 'Love': '💕', 'Семейн': '👨‍👩‍👧‍👦', 'Детск': '🧸', 'Беремен': '🤰', 'Предмет': '📦', 'Ретуш': '🎨', 'Аренд': '🏠', 'Видео': '🎥' };
            for (const [key, icon] of Object.entries(icons)) { if (name.includes(key)) return icon; }
            return '📷';
        }
        
        async function proceedToCheckout() {
            if (selectedServices.length === 0) { showAlert('Сначала выберите услугу', 'error'); return; }
            await loadPhotographersForOrder();
        }
        
        async function loadPhotographersForOrder() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/client/photographers');
                const text = await response.text();
                if (!text || text.trim() === '') throw new Error('Сервер вернул пустой ответ');
                photographers = JSON.parse(text);
                if (photographers.length === 0) throw new Error('Нет активных фотографов');
                renderPhotographerSelection();
            } catch (error) {
                content.innerHTML = `
                    <div class="card" style="max-width:600px; margin:0 auto;">
                        <h2 style="color: white;">❌ Ошибка загрузки фотографов</h2>
                        <p style="color: white;">${error.message}</p>
                        <button class="btn btn-primary" onclick="loadServicesWithOptions()">← Вернуться к услугам</button>
                    </div>
                `;
            }
        }
        
        function renderPhotographerSelection() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card" style="max-width:600px; margin:0 auto;">
                    <h2 style="color: white;">📷 Выберите фотографа</h2>
                    ${photographers.map(p => `<div class="photographer-card" onclick="selectPhotographer(${p.id}, '${p.firstName} ${p.lastName}')"><div style="display:flex; align-items:center; gap:15px;"><div style="font-size:40px;">📸</div><div><h3 style="color: white;">${p.firstName} ${p.lastName}</h3><p style="color: rgba(255,255,255,0.7);">${p.email}</p></div></div></div>`).join('')}
                    <button class="btn btn-secondary" onclick="loadServicesWithOptions()">← Назад к услугам</button>
                </div>
            `;
        }
        
        window.selectPhotographer = function(id, name) {
            selectedPhotographer = { id, name };
            renderDateTimeSelection();
        };
        
        function renderDateTimeSelection() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card" style="max-width:600px; margin:0 auto;">
                    <h2 style="color: white;">⏰ Выберите дату и время</h2>
                    <div class="form-group"><label style="color: white;">Дата</label><input type="date" id="orderDate" min="${new Date().toISOString().split('T')[0]}"></div>
                    <div class="form-group"><label style="color: white;">Время</label><select id="orderTime"><option value="10:00">10:00</option><option value="11:00">11:00</option><option value="12:00">12:00</option><option value="13:00">13:00</option><option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option><option value="17:00">17:00</option><option value="18:00">18:00</option></select></div>
                    <div class="form-group"><label style="color: white;">Способ оплаты</label><select id="paymentMethodSelect"><option value="card">💳 Банковская карта</option><option value="cash">💰 Наличные</option><option value="online">🏦 Онлайн перевод</option><option value="installment">📅 Рассрочка</option></select></div>
                    <button class="btn btn-primary" onclick="createFinalOrder()">✅ Подтвердить заказ</button>
                    <button class="btn btn-secondary" onclick="loadPhotographersForOrder()">← Назад</button>
                </div>
            `;
        }
        
        async function createFinalOrder() {
            const orderDate = document.getElementById('orderDate').value;
            const orderTime = document.getElementById('orderTime').value;
            const paymentMethod = document.getElementById('paymentMethodSelect').value;
            
            if (!orderDate) { showAlert('Выберите дату', 'error'); return; }
            if (!selectedPhotographer) { showAlert('Выберите фотографа', 'error'); return; }
            
            const optionsText = selectedOptions.length > 0 ? `, Эффекты: ${selectedOptions.map(o => o.name).join(', ')}` : '';
            const notes = `Фотограф: ${selectedPhotographer.name}, Дата: ${orderDate} ${orderTime}${optionsText}`;
            
            try {
                const response = await apiRequest('/client/orders', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        serviceIds: selectedServices.map(s => s.id),
                        notes: notes,
                        paymentMethod: paymentMethod
                    })
                });
                if (response.ok) {
                    showAlert('✅ Заказ успешно создан!', 'success');
                    loadDashboard();
                } else {
                    const error = await response.text();
                    showAlert('❌ Ошибка: ' + error, 'error');
                }
            } catch (error) {
                showAlert('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        window.loadDashboard = loadDashboard;
        window.loadOrders = loadOrders;
        window.loadServicesWithOptions = loadServicesWithOptions;
        
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadDashboard();
        }
    </script>
</body>
</html>
