<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бухгалтер - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Дополнительные стили для бухгалтера в неоновой теме */
        .report-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .report-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 255, 0.3);
            border-color: var(--fuchsia);
        }
        .report-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .report-stat {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .report-stat .value { font-size: 24px; font-weight: bold; color: white; text-shadow: 0 0 3px #FF00FF; }
        .report-stat .label { font-size: 12px; color: rgba(255,255,255,0.8); }
        
        .payment-method {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: rgba(255,255,255,0.8);
        }
        .payment-method strong {
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .btn-generate {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            margin-right: 10px;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .btn-send-receipt {
            background: linear-gradient(135deg, #8b5e9c 0%, #c084fc 100%);
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-send-receipt:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        
        .reports-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .report-item {
            background: rgba(30, 15, 40, 0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid var(--fuchsia);
            color: rgba(255,255,255,0.8);
        }
        .report-item:hover {
            transform: translateX(5px);
            background: rgba(255, 0, 255, 0.15);
        }
        .report-title { font-weight: bold; font-size: 16px; color: white; text-shadow: 0 0 3px #FF00FF; }
        .report-date { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px; }
        .report-period { font-size: 12px; color: #FF66FF; margin-top: 5px; text-shadow: 0 0 2px #FF00FF; }
        
        .date-range-container {
            background: rgba(30, 15, 40, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 0, 255, 0.2);
        }
        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .date-field {
            background: rgba(30, 15, 40, 0.6);
            border-radius: 16px;
            padding: 5px;
        }
        .date-field label {
            display: block;
            color: #FF66FF;
            font-size: 12px;
            margin-bottom: 5px;
            margin-left: 12px;
            text-shadow: 0 0 2px #FF00FF;
        }
        .date-field input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 15, 40, 0.8);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .date-field input:focus {
            outline: none;
            border-color: #FF00FF;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }
        .date-field input:hover {
            border-color: #FF66FF;
        }
        
        .report-detail-modal {
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .detail-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(30, 15, 40, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 255, 0.2);
        }
        .detail-section h4 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
            margin-bottom: 10px;
        }
        .detail-section p {
            color: white;
        }
        .detail-section strong {
            color: #FF66FF;
        }
        
        .photographer-performance-card {
            background: rgba(30, 15, 40, 0.4);
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #FF00FF;
            transition: all 0.3s;
        }
        .photographer-performance-card:hover {
            transform: translateX(5px);
            background: rgba(255, 0, 255, 0.1);
        }
        .photographer-performance-card strong {
            color: #FF66FF;
            font-size: 16px;
            text-shadow: 0 0 2px #FF00FF;
        }
        .photographer-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .photographer-stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
        }
        .photographer-stat span {
            color: #FF66FF;
            font-weight: bold;
        }
        
        .revenue-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .revenue-card {
            background: linear-gradient(135deg, rgba(179,68,108,0.3), rgba(191,0,255,0.3));
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .revenue-card .revenue-value {
            font-size: 28px;
            font-weight: bold;
            color: #FF66FF;
            text-shadow: 0 0 3px #FF00FF;
        }
        .revenue-card .revenue-label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .orders-table th, .orders-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: white;
        }
        .orders-table th {
            background: rgba(179, 68, 108, 0.3);
            font-weight: 700;
        }
        
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-summary-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.3) 0%, rgba(191, 0, 255, 0.3) 100%);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-summary-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--fuchsia);
        }
        .stat-summary-card .value {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        .stat-summary-card .label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .stat-card h3 {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .card h2 {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .card p {
            color: white;
        }
        
        .card strong {
            color: #FF66FF;
        }
        
        .navbar-logo {
            color: white;
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;
        }
        
        .navbar-links a {
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .navbar-links a:hover {
            text-shadow: 0 0 5px #FF00FF;
        }
        
        .user-name {
            color: white;
            text-shadow: 0 0 3px #FF00FF;
        }
        
        .form-group label {
            color: white;
        }
        
        .form-group input, .form-group select {
            background: rgba(30, 15, 40, 0.8);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            width: 100%;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: #FF00FF;
            box-shadow: 0 0 5px rgba(255,0,255,0.3);
            outline: none;
        }
        
        .btn-primary {
            background: var(--main-gradient);
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        
        .btn-primary:hover {
            box-shadow: var(--shadow-glow);
        }
        
        .btn-secondary {
            background: rgba(30, 15, 40, 0.8);
            color: white;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 0, 255, 0.15);
            border-color: #FF00FF;
        }
        
        .order-table {
            width: 100%;
            border-collapse: collapse;
        }
        .order-table th, .order-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: white;
        }
        .order-table th {
            background: rgba(179, 68, 108, 0.3);
            font-weight: 700;
        }
        
        .receipts-container {
            max-height: 600px;
            overflow-y: auto;
        }
        .receipt-card {
            background: rgba(30, 15, 40, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 0, 255, 0.2);
            transition: all 0.3s;
        }
        .receipt-card:hover {
            transform: translateX(5px);
            border-color: var(--fuchsia);
        }
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            flex-wrap: wrap;
            gap: 10px;
        }
        .receipt-number {
            font-size: 18px;
            font-weight: bold;
            color: #FF66FF;
            text-shadow: 0 0 2px #FF00FF;
        }
        .receipt-date {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        .receipt-body {
            display: grid;
            gap: 10px;
        }
        .receipt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .receipt-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        .receipt-value {
            color: white;
            font-weight: 600;
        }
        .receipt-total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 0, 255, 0.2);
            font-size: 16px;
        }
        .receipt-total .receipt-label {
            font-size: 16px;
            font-weight: bold;
        }
        .receipt-total .receipt-value {
            font-size: 20px;
            color: #FF66FF;
            text-shadow: 0 0 2px #FF00FF;
        }
        .receipt-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .receipt-status-sent {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }
        .receipt-status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }
        
        .client-order-selector {
            background: rgba(30, 15, 40, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .order-preview {
            background: rgba(255, 0, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255, 0, 255, 0.2);
        }
        
        .order-preview-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-preview-row:last-child {
            border-bottom: none;
        }
        
        .order-preview-label {
            color: rgba(255,255,255,0.7);
        }
        
        .order-preview-value {
            color: white;
            font-weight: 600;
        }
        
        .order-preview-total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 0, 255, 0.3);
        }
        
        .order-preview-total .order-preview-value {
            color: #FF66FF;
            font-size: 18px;
            text-shadow: 0 0 2px #FF00FF;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,0,255,0.3);
            border-top: 3px solid #FF00FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-text {
            color: #fca5a5;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .receipt-created-notification {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideDown 0.3s ease-out;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .date-range {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .stats-summary {
                grid-template-columns: 1fr 1fr;
            }
            .order-table {
                font-size: 12px;
            }
            .order-table th, .order-table td {
                padding: 6px;
            }
            .receipt-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .receipt-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../js/animations-light.js"></script>
    <script>
        const API_URL = 'https://localhost:7042/api';
        let currentToken = null;
        let currentUser = null;
        
        function getPaymentStatusText(status) {
            const statuses = { 0: '⏳ Не оплачен', 1: '🔄 Частично оплачен', 2: '✅ Оплачен', 3: '↩️ Возврат' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getPaymentStatusClass(status) {
            const classes = { 0: 'payment-status-notpaid', 1: 'payment-status-partial', 2: 'payment-status-paid', 3: 'payment-status-notpaid' };
            return classes[status] || 'payment-status-notpaid';
        }
        
        function getPaymentMethodText(method) {
            const methods = { 'card': '💳 Банковская карта', 'cash': '💰 Наличные', 'online': '🏦 Онлайн перевод', 'installment': '📅 Рассрочка' };
            return methods[method] || method || 'Не указан';
        }
        
        function getStatusName(status) {
            const statuses = { 0: 'Ожидает', 1: 'Подтвержден', 2: 'В работе', 3: 'Выполнен', 4: 'Отменен' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getStatusClass(status) {
            const classes = { 0: 'status-pending', 1: 'status-confirmed', 2: 'status-progress', 3: 'status-completed', 4: 'status-cancelled' };
            return classes[status] || 'status-pending';
        }
        
        function formatReceiptNumber(number) {
            return `ЧЕК-${String(number).padStart(6, '0')}`;
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return false;
            }
            currentToken = token;
            currentUser = JSON.parse(user);
            if (currentUser.role !== 'Accountant') {
                alert('Доступ только для бухгалтера!');
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function getErrorMessage(response) {
            try {
                const clonedResponse = response.clone();
                const json = await clonedResponse.json();
                return json.message || json.title || 'Неизвестная ошибка';
            } catch (e) {
                try {
                    const text = await response.text();
                    return text.substring(0, 200);
                } catch (e2) {
                    return `Ошибка ${response.status}: ${response.statusText}`;
                }
            }
        }
        
        async function apiRequest(endpoint, options = {}) {
            const url = `${API_URL}${endpoint}`;
            console.log(`📡 Запрос: ${options.method || 'GET'} ${url}`);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${currentToken}`, 
                        ...options.headers 
                    }
                });
                
                if (response.status === 401) {
                    logout();
                    return response;
                }
                
                return response;
            } catch (error) {
                console.error(`❌ Ошибка сети: ${error.message}`);
                throw error;
            }
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.padding = '15px';
            alertDiv.style.borderRadius = '10px';
            if (type === 'error') {
                alertDiv.style.background = 'rgba(239, 68, 68, 0.9)';
            } else if (type === 'warning') {
                alertDiv.style.background = 'rgba(245, 158, 11, 0.9)';
            } else {
                alertDiv.style.background = 'rgba(16, 185, 129, 0.9)';
            }
            alertDiv.style.color = 'white';
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 4000);
        }
        
        function showLoading() {
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.id = 'loadingOverlay';
            overlay.innerHTML = '<div class="loading-spinner"></div>';
            document.body.appendChild(overlay);
        }
        
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }
        
        function renderNavbar() {
            return `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-logo" style="color: white; text-shadow: 0 0 5px #FF00FF, 0 0 10px #BF00FF;">📸 PhotoStudio CRM - Бухгалтерия</div>
                        <div class="navbar-links">
                            <a onclick="loadFinancialSummary()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">💰 Финансы</a>
                            <a onclick="loadReceipts()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">🧾 Чеки</a>
                            <a onclick="loadReports()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📄 Отчеты</a>
                            <a onclick="loadRevenueReportForm()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📊 Доходы</a>
                            <a onclick="loadPhotographerReportForm()" style="color: white; text-shadow: 0 0 2px rgba(0,0,0,0.5);">📷 Фотографы</a>
                        </div>
                        <div class="user-info">
                            <span class="user-name" style="color: white; text-shadow: 0 0 3px #FF00FF;">💰 ${currentUser.firstName} ${currentUser.lastName}</span>
                            <button class="logout-btn" onclick="logout()" style="color: white;">Выйти</button>
                        </div>

                            <div class="receipt-row"><span class="receipt-label">📨 Отправлен в профиль клиента:</span><span class="receipt-value">✅ Доступен в личном кабинете</span></div>
                        ` : `<button class="btn-send-receipt" onclick="sendReceiptToClient(${receipt.receiptId})">📧 Отправить клиенту</button>`}
                    </div>
                </div>
            `).join('');
        }
        
        window.sendReceiptToClient = function(receiptId) {
            const receipts = JSON.parse(localStorage.getItem('accountingReports') || '[]');
            const receipt = receipts.find(r => r.receiptId == receiptId);
            
            if (!receipt) {
                showAlert('❌ Чек не найден', 'error');
                return;
            }
            
            let clientReceipts = JSON.parse(localStorage.getItem(`client_receipts_${receipt.clientId}`) || '[]');
            clientReceipts.unshift({
                id: receipt.receiptId,
                receiptNumber: receipt.receiptNumber,
                orderId: receipt.orderId,
                amount: receipt.paidAmount,
                paymentMethod: receipt.paymentMethod,
                paymentMethodText: receipt.paymentMethodText,
                createdDate: receipt.createdAt,
                isSent: true,
                sentDate: new Date().toISOString()
            });
            localStorage.setItem(`client_receipts_${receipt.clientId}`, JSON.stringify(clientReceipts.slice(0, 100)));
            
            receipt.isSent = true;
            receipt.sentDate = new Date().toISOString();
            localStorage.setItem('accountingReports', JSON.stringify(receipts));
            
            showAlert(`✅ Чек ${receipt.receiptNumber} отправлен клиенту ${receipt.clientName} в личный кабинет!`, 'success');
            loadReceipts();
        };

                        paymentMethod: paymentMethod,
                        paymentMethodText: getPaymentMethodText(paymentMethod),
                        createdAt: new Date().toISOString(),
                        status: 'created',
                        addedToAccounting: true,
                        isSent: false,
                        sentToClient: false
                    };
                    
                    let accountingReports = JSON.parse(localStorage.getItem('accountingReports') || '[]');
                    accountingReports.unshift(accountingReport);
                    localStorage.setItem('accountingReports', JSON.stringify(accountingReports.slice(0, 100)));
                    
                    modal.remove();
                    
                    showCreateReceiptNotification('Клиент неизвестен', receiptNumber, amount);
                    showAlert(`✅ Чек ${receiptNumber} создан в отчёте бухгалтерии!`, 'success');
                    loadReceipts();
                } catch (error) {
                    showAlert('❌ Ошибка: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            };
        }
        
        function showCreateReceiptNotification(clientName, receiptNumber, amount) {
            const notification = document.createElement('div');
            notification.className = 'receipt-created-notification';
            notification.innerHTML = `
                ✅ Чек ${receiptNumber} создан и сохранён в отчёте бухгалтерии!<br>
                Клиент: ${clientName} | Сумма: ${amount.toLocaleString()} ₽<br>
                <small>⚠️ Чек будет отправлен клиенту автоматически после оплаты заказа.</small>
            `;
            
            const content = document.getElementById('pageContent');
            const firstChild = content.firstChild;
            content.insertBefore(notification, firstChild);
            
            setTimeout(() => {
                notification.remove();
            }, 8000);
        }
        
        // ============ ОТЧЕТЫ ============
        
        async function loadReports() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/accountant/reports');
                const reports = await response.json();
                content.innerHTML = `
                    <div class="card">
                        <h2>📄 Сгенерированные отчеты</h2>
                        <div style="margin-bottom:20px;">
                            <button class="btn btn-generate" onclick="loadRevenueReportForm()">+ Создать отчет по доходам</button>
                            <button class="btn btn-primary" onclick="loadPhotographerReportForm()" style="margin-left:10px;">+ Создать отчет по фотографам</button>
                            <button class="btn btn-secondary" onclick="showAccountingReportsModal()" style="margin-left:10px;">📋 Отчеты бухгалтерии (чеки)</button>
                        </div>
                        <div class="reports-list">${(reports || []).map(r => `
                            <div class="report-item" onclick="viewReportDetail(${r.id})">
                                <div class="report-title">📊 ${r.reportType}</div>
                                <div class="report-date">📅 Создан: ${new Date(r.generatedDate).toLocaleString()}</div>
                                <div class="report-period">📆 Период: ${new Date(r.startDate).toLocaleDateString()} - ${new Date(r.endDate).toLocaleDateString()}</div>
                            </div>
                        `).join('') || '<p style="text-align:center; padding:20px;">Нет созданных отчетов</p>'}</div>
                    </div>
                `;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">${error.message}</div>`; }
        }
        
        // Улучшенный просмотр деталей отчёта
        window.viewReportDetail = async function(id) {
            try {
                const response = await apiRequest(`/accountant/reports/${id}`);
                const report = await response.json();
                let reportData = null;
                try {
                    reportData = JSON.parse(report.data);
                } catch(e) {
                    reportData = report.data;
                }
                
                let detailHtml = '';
                
                // Отчёт по доходам
                if (report.reportType === 'Revenue Report') {
                    const totalRevenue = reportData?.totalRevenue || 0;
                    const totalPayments = reportData?.totalPayments || 0;
                    const ordersCount = reportData?.ordersCount || 0;
                    const orders = reportData?.orders || [];
                    
                    detailHtml = `
                        <div class="revenue-summary">
                            <div class="revenue-card"><div class="revenue-value">${totalRevenue.toLocaleString()} ₽</div><div class="revenue-label">💰 Общая выручка</div></div>
                            <div class="revenue-card"><div class="revenue-value">${totalPayments.toLocaleString()} ₽</div><div class="revenue-label">💵 Получено платежей</div></div>
                            <div class="revenue-card"><div class="revenue-value">${ordersCount}</div><div class="revenue-label">📦 Всего заказов</div></div>
                        </div>
                        <div class="detail-section">
                            <h4>📋 Детали заказов за период</h4>
                            ${orders && orders.length > 0 ? `
                                <div class="table-responsive" style="overflow-x: auto;">
                                    <table class="orders-table">
                                        <thead>
                                            <tr><th>№</th><th>Дата</th><th>Сумма</th><th>Оплачено</th><th>Статус оплаты</th><th>Статус заказа</th></tr>
                                        </thead>
                                        <tbody>
                                            ${orders.map(order => `
                                                <tr>
                                                    <td>${order.id}</td>
                                                    <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                                                    <td>${(order.totalAmount || 0).toLocaleString()} ₽</td
                                                    <td>${(order.totalPaid || 0).toLocaleString()} ₽</td
                                                    <td><span class="${getPaymentStatusClass(order.paymentStatus)}">${getPaymentStatusText(order.paymentStatus)}</span></td
                                                    <td><span class="${getStatusClass(order.status)}">${getStatusName(order.status)}</span></td
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            ` : '<p style="color: rgba(255,255,255,0.7);">Нет данных о заказах</p>'}
                        </div>
                    `;
                } 
                // Отчёт по фотографам
                else if (report.reportType === 'Photographer Performance Report') {
                    const photographersData = Array.isArray(reportData) ? reportData : [];
                    const totalRevenue = photographersData.reduce((sum, p) => sum + (p.TotalRevenue || p.totalRevenue || 0), 0);
                    const totalOrders = photographersData.reduce((sum, p) => sum + (p.TotalOrders || p.totalOrders || 0), 0);
                    const totalCompleted = photographersData.reduce((sum, p) => sum + (p.CompletedOrders || p.completedOrders || 0), 0);
                    
                    detailHtml = `
                        <div class="revenue-summary">
                            <div class="revenue-card"><div class="revenue-value">${totalRevenue.toLocaleString()} ₽</div><div class="revenue-label">💰 Общая выручка</div></div>
                            <div class="revenue-card"><div class="revenue-value">${totalOrders}</div><div class="revenue-label">📷 Всего заказов</div></div>
                            <div class="revenue-card"><div class="revenue-value">${totalCompleted}</div><div class="revenue-label">✅ Выполнено заказов</div></div>
                        </div>
                        <div class="detail-section">
                            <h4>📸 Эффективность фотографов</h4>
                            ${photographersData.length > 0 ? photographersData.map(p => `
                                <div class="photographer-performance-card">
                                    <div><strong>${p.PhotographerName || p.photographerName || 'Не указан'}</strong></div>
                                    <div class="photographer-stats">
                                        <div class="photographer-stat">📷 Всего заказов: <span>${p.TotalOrders || p.totalOrders || 0}</span></div>
                                        <div class="photographer-stat">✅ Выполнено: <span>${p.CompletedOrders || p.completedOrders || 0}</span></div>
                                        <div class="photographer-stat">💰 Выручка: <span>${(p.TotalRevenue || p.totalRevenue || 0).toLocaleString()} ₽</span></div>
                                        <div class="photographer-stat">📊 Выполняемость: <span>${p.CompletionRate ? p.CompletionRate.toFixed(1) : '0'}%</span></div>
                                    </div>
                                </div>
                            `).join('') : '<p style="color: rgba(255,255,255,0.7);">Нет данных о фотографах</p>'}
                        </div>
                    `;
                } 
                else {
                    detailHtml = `<div class="detail-section"><pre style="color: white; white-space: pre-wrap; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;">${JSON.stringify(reportData, null, 2)}</pre></div>`;
                }
                
                showModal(`
                    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="color: white; text-shadow: 0 0 5px #FF00FF;">📊 ${report.reportType}</h3>
                        <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: white;">&times;</button>
                    </div>
                    <div>
                        <p><strong style="color: #FF66FF;">📅 Период:</strong> ${new Date(report.startDate).toLocaleDateString()} - ${new Date(report.endDate).toLocaleDateString()}</p>
                        <p><strong style="color: #FF66FF;">🕐 Создан:</strong> ${new Date(report.generatedDate).toLocaleString()}</p>
                        <p><strong style="color: #FF66FF;">👤 Кем создан:</strong> ${report.generatedByUser?.firstName || report.generatedByUser?.email || 'Бухгалтер'}</p>
                    </div>
                    ${detailHtml}
                `);
            } catch(e) { showAlert('Ошибка загрузки отчета', 'error'); }
        };
        
        function showModal(content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content report-detail-modal" style="background: #1a0a2e; border: 1px solid #FF00FF; color: white; max-width: 900px;">${content}</div>`;
            document.body.appendChild(modal);
        }
        
        window.closeModal = () => { const m = document.querySelector('.modal'); if(m) m.remove(); };
        
        window.showAccountingReportsModal = function() {
            const accountingReports = JSON.parse(localStorage.getItem('accountingReports') || '[]');
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            
            if (accountingReports.length === 0) {
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 700px; max-height: 80vh; overflow-y: auto;">
                        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="color: white; text-shadow: 0 0 5px #FF00FF;">📋 Отчеты бухгалтерии (созданные чеки)</h3>
                            <button onclick="this.closest('.modal').remove()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: white;">&times;</button>
                        </div>
                        <div style="text-align: center; padding: 40px;">
                            <p style="color: rgba(255,255,255,0.7);">📭 Нет созданных чеков</p>
                        </div>
                        <button class="btn btn-secondary" onclick="this.closest('.modal').remove()" style="width: 100%;">Закрыть</button>
                    </div>
                `;
            } else {
                const totalSum = accountingReports.reduce((sum, r) => sum + (r.paidAmount || 0), 0);
                
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
                        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                            <h3 style="color: white; text-shadow: 0 0 5px #FF00FF;">📋 Отчеты бухгалтерии</h3>
                            <button onclick="this.closest('.modal').remove()" style="background: rgba(255,0,255,0.2); border: 1px solid #FF00FF; border-radius: 8px; padding: 5px 10px; cursor: pointer; color: white;">&times; Закрыть</button>
                        </div>
                        
                        <div class="stats-summary" style="margin-bottom: 20px;">
                            <div class="stat-summary-card">
                                <div class="value">${accountingReports.length}</div>
                                <div class="label">📄 Всего чеков</div>
                            </div>
                            <div class="stat-summary-card">
                                <div class="value">${totalSum.toLocaleString()} ₽</div>
                                <div class="label">💰 Общая сумма</div>
                            </div>
                            <div class="stat-summary-card">
                                <div class="value">${accountingReports.filter(r => r.isSent).length}</div>
                                <div class="label">✅ Отправлено клиентам</div>
                            </div>
                        </div>
                        
                        <div class="receipts-container">
                            ${accountingReports.map(report => `
                                <div class="receipt-card">
                                    <div class="receipt-header">
                                        <div class="receipt-number">${report.receiptNumber}</div>
                                        <div class="receipt-date">📅 ${new Date(report.createdAt).toLocaleString()}</div>
                                    </div>
                                    <div class="receipt-body">
                                        <div class="receipt-row">
                                            <span class="receipt-label">👤 Клиент:</span>
                                            <span class="receipt-value"><strong>${report.clientName}</strong></span>
                                        </div>
                                        <div class="receipt-row">
                                            <span class="receipt-label">📧 Email:</span>
                                            <span class="receipt-value">${report.clientEmail || 'не указан'}</span>
                                        </div>
                                        <div class="receipt-row">
                                            <span class="receipt-label">📝 Заказ #:</span>
                                            <span class="receipt-value">${report.orderId}</span>
                                        </div>
                                        <div class="receipt-row">
                                            <span class="receipt-label">💳 Способ оплаты:</span>
                                            <span class="receipt-value">${report.paymentMethodText}</span>
                                        </div>
                                        <div class="receipt-row">
                                            <span class="receipt-label">💰 Сумма заказа:</span>
                                            <span class="receipt-value">${(report.orderAmount || 0).toLocaleString()} ₽</span>
                                        </div>
                                        <div class="receipt-row receipt-total">
                                            <span class="receipt-label">💵 Оплачено по чеку:</span>
                                            <span class="receipt-value">${(report.paidAmount || 0).toLocaleString()} ₽</span>
                                        </div>
                                        <div class="receipt-row" style="margin-top: 5px;">
                                            <span class="receipt-label">📊 Статус:</span>
                                            <span class="receipt-value" style="color: ${report.isSent ? '#6ee7b7' : '#fcd34d'}">
                                                ${report.isSent ? '✅ Отправлен клиенту (после оплаты)' : '⏳ Ожидает оплаты клиентом'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div style="margin-top: 20px; text-align: center; padding-top: 15px; border-top: 1px solid rgba(255,0,255,0.2);">
                            <p style="color: rgba(255,255,255,0.5); font-size: 11px;">Всего чеков: ${accountingReports.length} | Общая сумма: ${totalSum.toLocaleString()} ₽</p>
                        </div>
                    </div>
                `;
            }
            document.body.appendChild(modal);
        };
        
        // ============ ФОРМА СОЗДАНИЯ ОТЧЕТА ПО ДОХОДАМ ============
        
        async function loadRevenueReportForm() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card">
                    <h2>📊 Создание отчета по доходам</h2>
                    <div class="date-range-container">
                        <div class="date-range">
                            <div class="date-field">
                                <label>📅 Начальная дата</label>
                                <input type="date" id="startDate" value="${new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]}">
                            </div>
                            <div class="date-field">
                                <label>📅 Конечная дата</label>
                                <input type="date" id="endDate" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-generate" onclick="generateRevenueReport()">📈 Сформировать отчет</button>
                        <button class="btn btn-secondary" onclick="loadReports()">◀ К списку отчетов</button>
                    </div>
                    <div id="reportResult" style="margin-top:20px;"></div>
                </div>
            `;
        }
        
        window.generateRevenueReport = async function() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const resultDiv = document.getElementById('reportResult');
            
            if (!start || !end) {
                showAlert('Выберите даты', 'error');
                return;
            }
            
            resultDiv.innerHTML = '<div class="spinner"></div>';
            showLoading();
            
            try {
                const response = await apiRequest(`/accountant/reports/revenue?startDate=${start}&endDate=${end}`);
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="receipt-created-notification" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">✅ Отчет по доходам успешно создан! Нажмите "К списку отчетов" для просмотра.</div>';
                    showAlert('Отчет создан', 'success');
                    setTimeout(() => loadReports(), 2000);
                } else {
                    const error = await getErrorMessage(response);
                    resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`;
            } finally {
                hideLoading();
            }
        };
        
        // ============ ФОРМА СОЗДАНИЯ ОТЧЕТА ПО ФОТОГРАФАМ ============
        
        async function loadPhotographerReportForm() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="card">
                    <h2>📷 Отчет по эффективности фотографов</h2>
                    <div class="date-range-container">
                        <div class="date-range">
                            <div class="date-field">
                                <label>📅 Начальная дата</label>
                                <input type="date" id="startDatePhoto" value="${new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]}">
                            </div>
                            <div class="date-field">
                                <label>📅 Конечная дата</label>
                                <input type="date" id="endDatePhoto" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-generate" onclick="generatePhotographerReport()">📊 Сформировать отчет</button>
                        <button class="btn btn-secondary" onclick="loadReports()">◀ К списку отчетов</button>
                    </div>
                    <div id="reportPhotoResult" style="margin-top:20px;"></div>
                </div>
            `;
        }
        
        window.generatePhotographerReport = async function() {
            const start = document.getElementById('startDatePhoto').value;
            const end = document.getElementById('endDatePhoto').value;
            const resultDiv = document.getElementById('reportPhotoResult');
            
            if (!start || !end) {
                showAlert('Выберите даты', 'error');
                return;
            }
            
            resultDiv.innerHTML = '<div class="spinner"></div>';
            showLoading();
            
            try {
                const response = await apiRequest(`/accountant/reports/photographer-performance?startDate=${start}&endDate=${end}`);
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="receipt-created-notification" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">✅ Отчет по фотографам успешно создан! Нажмите "К списку отчетов" для просмотра.</div>';
                    showAlert('Отчет создан', 'success');
                    setTimeout(() => loadReports(), 2000);
                } else {
                    const error = await getErrorMessage(response);
                    resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`;
            } finally {
                hideLoading();
            }
        };
        
        // Экспорт функций
        window.loadFinancialSummary = loadFinancialSummary;
        window.loadReceipts = loadReceipts;
        window.loadReports = loadReports;
        window.loadRevenueReportForm = loadRevenueReportForm;
        window.loadPhotographerReportForm = loadPhotographerReportForm;
        window.showCreateReceiptModalWithClientSelect = showCreateReceiptModalWithClientSelect;
        window.showCreateReceiptModal = showCreateReceiptModal;
        window.showAccountingReportsModal = showAccountingReportsModal;
        window.sendReceiptToClient = sendReceiptToClient;
        window.viewReportDetail = viewReportDetail;
        
        // Запуск
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadFinancialSummary();
        }
    </script>
</body>
</html>
