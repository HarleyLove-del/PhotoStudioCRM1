<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бухгалтер - PhotoStudio CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Дополнительные стили для бухгалтера в неоновой теме */
        .report-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .report-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 255, 0.3);
            border-color: var(--fuchsia);
        }
        .report-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .report-stat {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .report-stat .value { font-size: 24px; font-weight: bold; color: var(--text-white); }
        .report-stat .label { font-size: 12px; color: var(--text-white-dim); }
        
        .payment-method {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.15);
            color: var(--text-white-dim);
        }
        .payment-method strong {
            color: var(--text-white);
        }
        
        .btn-generate {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            margin-right: 10px;
        }
        
        .reports-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .report-item {
            background: rgba(30, 15, 40, 0.6);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid var(--fuchsia);
            color: var(--text-white-dim);
        }
        .report-item:hover {
            transform: translateX(5px);
            background: rgba(255, 0, 255, 0.15);
        }
        .report-title { font-weight: bold; font-size: 16px; color: var(--text-white); }
        .report-date { font-size: 12px; color: var(--text-white-dim); margin-top: 5px; }
        .report-period { font-size: 12px; color: var(--fuchsia); margin-top: 5px; }
        
        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .report-detail-modal {
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .detail-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(30, 15, 40, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 255, 0.2);
        }
        .detail-section h4 {
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .photographer-performance {
            border-left: 3px solid var(--fuchsia);
            margin: 10px 0;
            padding: 10px;
            background: rgba(30, 15, 40, 0.4);
            border-radius: 8px;
        }
        
        /* Статусы оплаты в неоновой теме */
        .payment-status-paid { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-partial { background: rgba(245, 158, 11, 0.2); color: #fcd34d; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .payment-status-notpaid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-summary-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.3) 0%, rgba(191, 0, 255, 0.3) 100%);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-summary-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--fuchsia);
        }
        .stat-summary-card .value {
            font-size: 28px;
            font-weight: bold;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-summary-card .label {
            font-size: 12px;
            color: var(--text-white-dim);
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(179, 68, 108, 0.4) 0%, rgba(191, 0, 255, 0.4) 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--fuchsia);
        }
        .stat-card h3 {
            font-size: 14px;
            color: var(--text-white-dim);
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @media (max-width: 768px) {
            .date-range {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .stats-summary {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="../js/animations-light.js"></script>
    <script>
        const API_URL = 'https://localhost:7042/api';
        let currentToken = null;
        let currentUser = null;
        
        // Функции для статусов оплаты
        function getPaymentStatusText(status) {
            const statuses = { 0: '⏳ Не оплачен', 1: '🔄 Частично оплачен', 2: '✅ Оплачен', 3: '↩️ Возврат' };
            return statuses[status] || 'Неизвестно';
        }
        
        function getPaymentStatusClass(status) {
            const classes = { 0: 'payment-status-notpaid', 1: 'payment-status-partial', 2: 'payment-status-paid', 3: 'payment-status-notpaid' };
            return classes[status] || 'payment-status-notpaid';
        }
        
        function getPaymentMethodText(method) {
            const methods = { 'card': '💳 Карта', 'cash': '💰 Наличные', 'online': '🏦 Онлайн перевод', 'installment': '📅 Рассрочка' };
            return methods[method] || method || 'Не указан';
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return false;
            }
            currentToken = token;
            currentUser = JSON.parse(user);
            if (currentUser.role !== 'Accountant') {
                alert('Доступ только для бухгалтера!');
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}`, ...options.headers }
            });
            if (response.status === 401) logout();
            return response;
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '20px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.padding = '15px';
            alertDiv.style.borderRadius = '10px';
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function renderNavbar() {
            return `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-logo">📸 PhotoStudio CRM - Бухгалтерия</div>
                        <div class="navbar-links">
                            <a onclick="loadFinancialSummary()">💰 Финансы</a>
                            <a onclick="loadReports()">📄 Отчеты</a>
                            <a onclick="loadRevenueReportForm()">📊 Доходы</a>
                            <a onclick="loadPhotographerReportForm()">📷 Фотографы</a>
                        </div>
                        <div class="user-info">
                            <span class="user-name">💰 ${currentUser.firstName} ${currentUser.lastName}</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                </div>
                <div class="container" id="pageContent"><div class="spinner"></div></div>
            `;
        }
        
        // ============ ФИНАНСОВАЯ СВОДКА С ОПЛАТАМИ ============
        
        async function loadFinancialSummary() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/accountant/financial-summary');
                const data = await response.json();
                
                content.innerHTML = `
                    <div style="margin-bottom:30px;">
                        <h1>Финансовая сводка</h1>
                        <p style="color: var(--text-white-dim);">Актуальные финансовые показатели</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Общая выручка</h3><div class="value">${(data.totalRevenue || 0).toLocaleString()} ₽</div></div>
                        <div class="stat-card"><h3>Получено платежей</h3><div class="value">${(data.totalPayments || 0).toLocaleString()} ₽</div></div>
                        <div class="stat-card"><h3>Остаток к оплате</h3><div class="value">${(data.pendingAmount || 0).toLocaleString()} ₽</div></div>
                        <div class="stat-card"><h3>Выполнено заказов</h3><div class="value">${data.completedOrdersCount || 0}</div></div>
                    </div>
                    
                    <div class="stats-summary">
                        <div class="stat-summary-card"><div class="value">${data.paymentStatusStats?.paidOrders || 0}</div><div class="label">✅ Оплаченных заказов</div></div>
                        <div class="stat-summary-card"><div class="value">${data.paymentStatusStats?.partiallyPaidOrders || 0}</div><div class="label">🔄 Частично оплаченных</div></div>
                        <div class="stat-summary-card"><div class="value">${data.paymentStatusStats?.unpaidOrders || 0}</div><div class="label">⏳ Неоплаченных</div></div>
                        <div class="stat-summary-card"><div class="value">${data.paymentStatusStats?.cancelledOrders || 0}</div><div class="label">❌ Отмененных</div></div>
                    </div>
                    
                    <div class="card"><h2>💳 Платежи по методам</h2>
                        ${(data.paymentsByMethod || []).map(p => `<div class="payment-method"><strong>${getPaymentMethodText(p.method)}</strong><span class="value">${p.total.toLocaleString()} ₽</span></div>`).join('') || '<p>Нет данных</p>'}
                    </div>
                    
                    <div class="card"><h2>📅 Информация о периоде</h2>
                        <p><strong>Период:</strong> ${new Date(data.startDate).toLocaleDateString()} - ${new Date(data.endDate).toLocaleDateString()}</p>
                        <p><strong>Всего заказов:</strong> ${data.totalOrdersCount || 0}</p>
                    </div>
                `;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        }
        
        function renderPaymentMethods(payments) {
            if (!payments || payments.length === 0) return '<p>Нет данных о платежах</p>';
            return payments.map(p => `<div class="payment-method"><strong>${getPaymentMethodText(p.method)}</strong><span>${p.total.toLocaleString()} ₽</span></div>`).join('');
        }
        
        // ============ СПИСОК ОТЧЕТОВ ============
        
        async function loadReports() {
            const content = document.getElementById('pageContent');
            content.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest('/accountant/reports');
                const reports = await response.json();
                if (!reports || reports.length === 0) {
                    content.innerHTML = `<div class="card"><h2>📄 Сгенерированные отчеты</h2><p>Нет созданных отчетов</p>
                        <button class="btn btn-generate" onclick="loadRevenueReportForm()">+ Создать отчет по доходам</button>
                        <button class="btn btn-primary" onclick="loadPhotographerReportForm()" style="margin-left:10px;">+ Создать отчет по фотографам</button></div>`;
                    return;
                }
                content.innerHTML = `<div class="card"><h2>📄 Сгенерированные отчеты</h2>
                    <div style="margin-bottom:20px;">
                        <button class="btn btn-generate" onclick="loadRevenueReportForm()">+ Создать отчет по доходам</button>
                        <button class="btn btn-primary" onclick="loadPhotographerReportForm()" style="margin-left:10px;">+ Создать отчет по фотографам</button>
                    </div>
                    <div class="reports-list">${reports.map(report => `
                        <div class="report-item" onclick="viewReportDetail(${report.id})">
                            <div class="report-title">📊 ${report.reportType}</div>
                            <div class="report-date">📅 Создан: ${new Date(report.generatedDate).toLocaleString()}</div>
                            <div class="report-period">📆 Период: ${new Date(report.startDate).toLocaleDateString()} - ${new Date(report.endDate).toLocaleDateString()}</div>
                            <div><span style="color: var(--fuchsia);">👆 Нажмите для просмотра</span></div>
                        </div>`).join('')}</div></div>`;
            } catch (error) { content.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        }
        
        // ============ ПРОСМОТР ДЕТАЛЕЙ ОТЧЕТА ============
        
        window.viewReportDetail = async function(reportId) {
            try {
                const response = await apiRequest(`/accountant/reports/${reportId}`);
                const report = await response.json();
                let detailHtml = '';
                let reportData = null;
                try { reportData = JSON.parse(report.data); } catch(e) { reportData = report.data; }
                if (report.reportType === 'Revenue Report') {
                    detailHtml = `<div class="detail-section"><h4>💰 Общая информация</h4><p><strong>Общая выручка:</strong> ${reportData.totalRevenue?.toLocaleString() || 0} ₽</p>
                        <p><strong>Всего платежей:</strong> ${reportData.totalPayments?.toLocaleString() || 0} ₽</p><p><strong>Количество заказов:</strong> ${reportData.ordersCount || 0}</p></div>
                        <div class="detail-section"><h4>📋 Заказы за период</h4>${reportData.orders?.length > 0 ? `<table><thead><tr><th>№</th><th>Дата</th><th>Сумма</th></tr></thead><tbody>${reportData.orders.map(order => `<tr><td>${order.id}</td><td>${new Date(order.orderDate).toLocaleDateString()}</td><td>${order.totalAmount} ₽</td>`).join('')}</tbody></table>` : '<p>Нет данных о заказах</p>'}</div>`;
                } else if (report.reportType === 'Photographer Performance Report') {
                    detailHtml = `<div class="detail-section"><h4>📸 Эффективность фотографов</h4>${reportData && Array.isArray(reportData) ? reportData.map(p => `<div class="photographer-performance"><strong>${p.PhotographerName}</strong><br>📷 Всего заказов: ${p.TotalOrders}<br>✅ Выполнено: ${p.CompletedOrders}<br>💰 Выручка: ${p.TotalRevenue?.toLocaleString() || 0} ₽</div>`).join('') : '<p>Нет данных о фотографах</p>'}</div>`;
                } else { detailHtml = `<div class="detail-section"><pre>${JSON.stringify(reportData, null, 2)}</pre></div>`; }
                
                showModal(`
                    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="background: var(--main-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">📄 ${report.reportType}</h3>
                        <button class="close-modal" onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-white);">&times;</button>
                    </div>
                    <div>
                        <p><strong>📅 Период:</strong> ${new Date(report.startDate).toLocaleDateString()} - ${new Date(report.endDate).toLocaleDateString()}</p>
                        <p><strong>🕐 Создан:</strong> ${new Date(report.generatedDate).toLocaleString()}</p>
                        <p><strong>👤 Кем создан:</strong> ${report.generatedByUser?.firstName || 'Бухгалтер'}</p>
                    </div>
                    ${detailHtml}
                `);
            } catch (error) { showAlert('❌ Ошибка загрузки отчета: ' + error.message, 'error'); }
        };
        
        function showModal(content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content report-detail-modal" style="background: var(--bg-card); border: 1px solid rgba(255, 0, 255, 0.3);">${content}</div>`;
            document.body.appendChild(modal);
        }
        
        window.closeModal = function() { const modal = document.querySelector('.modal'); if (modal) modal.remove(); };
        
        // ============ ФОРМА СОЗДАНИЯ ОТЧЕТА ПО ДОХОДАМ ============
        
        async function loadRevenueReportForm() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `<div class="card"><h2>📊 Создание отчета по доходам</h2>
                <div class="date-range">
                    <div class="form-group"><label>Начальная дата</label><input type="date" id="startDate" value="${new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]}"></div>
                    <div class="form-group"><label>Конечная дата</label><input type="date" id="endDate" value="${new Date().toISOString().split('T')[0]}"></div>
                </div>
                <button class="btn btn-generate" onclick="generateRevenueReport()">📈 Сформировать отчет</button>
                <button class="btn btn-secondary" onclick="loadReports()" style="margin-left:10px;">◀ К списку отчетов</button>
                <div id="reportResult" style="margin-top:20px;"></div></div>`;
        }
        
        window.generateRevenueReport = async function() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const resultDiv = document.getElementById('reportResult');
            resultDiv.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest(`/accountant/reports/revenue?startDate=${startDate}&endDate=${endDate}`);
                if (response.ok) {
                    const report = await response.json();
                    resultDiv.innerHTML = `<div class="report-card" onclick="viewReportDetail(${report.id})"><h3>✅ Отчет создан!</h3><div class="report-stats">
                        <div class="report-stat"><div class="value">${new Date(report.startDate).toLocaleDateString()}</div><div class="label">Начало периода</div></div>
                        <div class="report-stat"><div class="value">${new Date(report.endDate).toLocaleDateString()}</div><div class="label">Конец периода</div></div>
                        <div class="report-stat"><div class="value">${new Date(report.generatedDate).toLocaleString()}</div><div class="label">Дата создания</div></div></div></div>
                        <p style="margin-top:15px;">✅ Отчет сохранен. <a href="#" onclick="loadReports(); return false;" style="color: var(--fuchsia);">Перейти к списку отчетов</a></p>`;
                    showAlert('✅ Отчет успешно создан!', 'success');
                } else { resultDiv.innerHTML = '<div class="alert alert-error">❌ Ошибка создания отчета</div>'; }
            } catch (error) { resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        };
        
        // ============ ФОРМА СОЗДАНИЯ ОТЧЕТА ПО ФОТОГРАФАМ ============
        
        async function loadPhotographerReportForm() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `<div class="card"><h2>📷 Отчет по эффективности фотографов</h2>
                <div class="date-range">
                    <div class="form-group"><label>Начальная дата</label><input type="date" id="startDatePhoto" value="${new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0]}"></div>
                    <div class="form-group"><label>Конечная дата</label><input type="date" id="endDatePhoto" value="${new Date().toISOString().split('T')[0]}"></div>
                </div>
                <button class="btn btn-generate" onclick="generatePhotographerReport()">📊 Сформировать отчет</button>
                <button class="btn btn-secondary" onclick="loadReports()" style="margin-left:10px;">◀ К списку отчетов</button>
                <div id="reportPhotoResult" style="margin-top:20px;"></div></div>`;
        }
        
        window.generatePhotographerReport = async function() {
            const startDate = document.getElementById('startDatePhoto').value;
            const endDate = document.getElementById('endDatePhoto').value;
            const resultDiv = document.getElementById('reportPhotoResult');
            resultDiv.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await apiRequest(`/accountant/reports/photographer-performance?startDate=${startDate}&endDate=${endDate}`);
                if (response.ok) {
                    const report = await response.json();
                    resultDiv.innerHTML = `<div class="report-card" onclick="viewReportDetail(${report.id})"><h3>✅ Отчет создан!</h3><div class="report-stats">
                        <div class="report-stat"><div class="value">${new Date(report.startDate).toLocaleDateString()}</div><div class="label">Начало периода</div></div>
                        <div class="report-stat"><div class="value">${new Date(report.endDate).toLocaleDateString()}</div><div class="label">Конец периода</div></div></div></div>
                        <p style="margin-top:15px;">✅ Отчет сохранен. <a href="#" onclick="loadReports(); return false;" style="color: var(--fuchsia);">Перейти к списку отчетов</a></p>`;
                    showAlert('✅ Отчет успешно создан!', 'success');
                } else { resultDiv.innerHTML = '<div class="alert alert-error">❌ Ошибка создания отчета</div>'; }
            } catch (error) { resultDiv.innerHTML = `<div class="alert alert-error">❌ Ошибка: ${error.message}</div>`; }
        };
        
        window.loadFinancialSummary = loadFinancialSummary;
        window.loadReports = loadReports;
        window.loadRevenueReportForm = loadRevenueReportForm;
        window.loadPhotographerReportForm = loadPhotographerReportForm;
        
        if (checkAuth()) {
            document.getElementById('app').innerHTML = renderNavbar();
            loadFinancialSummary();
        }
    </script>
