services:
  # SQL Server база данных
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest  # Используем стабильную версию 2019
    container_name: photostudio-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "P@ssw0rd2024!"
      MSSQL_PID: "Developer"
      # Отключаем некоторые расширенные возможности TLS
      MSSQL_COLLATION: "SQL_Latin1_General_CP1_CI_AS"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd2024!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Бэкенд API
  backend:
    build:
      context: ./PhotoStudioCRM.Backend
      dockerfile: Dockerfile
    container_name: photostudio-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:7042
      # Ключевое изменение - полная строка подключения с минимальными требованиями
      - ConnectionStrings__Default=Server=db,1433;Database=PhotoStudioDB;User Id=sa;Password=P@ssw0rd2024!;TrustServerCertificate=true;Encrypt=false;MultipleActiveResultSets=true;Connect Timeout=30;
    ports:
      - "7042:7042"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Фронтенд статика
  frontend:
    build:
      context: ./photo-frontend
      dockerfile: Dockerfile
    container_name: photostudio-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  sqlserver_data:
  backend_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
